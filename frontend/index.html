<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Zkita AI · by xkitz7</title>
  <!-- Highlight.js for code -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/css/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- MingCute Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mingcute_icon@1.0.0/css/mingcute.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* Light theme (default) */
    :root {
      --bg: #faf0ff;
      --surface: rgba(255, 245, 255, 0.68);
      --surface-solid: #fff0fe;
      --sidebar-bg: #fff5fe;
      --text: #1a0b1e;
      --text-secondary: #6b4e7e;
      --accent: #c084fc;
      --accent-hover: #a855f7;
      --border: rgba(0, 0, 0, 0.06);
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.04);
      --user-msg-bg: #e9d5ff;
      --assistant-msg-bg: #ffffffcc;
      --code-bg: #f3e8ff;
      --scrollbar: #d9c7f0;
      --header-bg: #ffffffdd;
    }

    body.dark {
      --bg: #0a0a0f;
      --surface: rgba(18, 18, 28, 0.75);
      --surface-solid: #12121c;
      --sidebar-bg: #0f0f18;
      --text: #f0e6ff;
      --text-secondary: #a78bc7;
      --accent: #d780ff;
      --accent-hover: #e09eff;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
      --user-msg-bg: #2e1a47;
      --assistant-msg-bg: #1e102ccc;
      --code-bg: #1e1730;
      --scrollbar: #3c2a4a;
      --header-bg: #1a1a24dd;
    }

    body {
      background: var(--bg);
      font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;
      color: var(--text);
      height: 100vh;
      display: flex;
      transition: background 0.2s;
      overflow: hidden;
    }

    /* ========= DEEPSEEK-LIKE SIDEBAR ========= */
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 12px;
      flex-shrink: 0;
      transition: width 0.2s;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 0 8px;
    }
    .logo-area h2 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #b77dff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo-area p {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }
    .settings-sidebar-btn {
      background: transparent;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 6px;
      border-radius: 40px;
      transition: 0.2s;
    }
    .settings-sidebar-btn:hover {
      background: var(--accent);
      color: #1a0b1e;
    }

    .new-chat-btn {
      background: var(--accent);
      border: none;
      padding: 10px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #1a0b1e;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
      transition: 0.2s;
    }
    .new-chat-btn:hover {
      background: var(--accent-hover);
      transform: scale(0.98);
    }

    .search-history {
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 8px 14px;
      font-size: 0.8rem;
      width: 100%;
      margin-bottom: 20px;
      color: var(--text);
      outline: none;
    }

    .history-section {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .history-group h4 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      margin: 0 8px 8px 8px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 28px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: 0.1s;
      color: var(--text);
    }
    .history-item:hover {
      background: var(--accent);
      color: #1a0b1e;
    }
    .history-item.active {
      background: var(--accent);
      color: #1a0b1e;
      font-weight: 500;
    }
    .chat-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-actions {
      display: flex;
      gap: 6px;
      opacity: 0.6;
    }
    .chat-actions i {
      font-size: 1rem;
      cursor: pointer;
    }

    /* User profile at bottom */
    .user-profile {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 8px;
      border-top: 1px solid var(--border);
      margin-top: 12px;
    }
    .avatar {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #1a0b1e;
    }
    .avatar i {
      font-size: 1.2rem;
    }
    .username {
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* ========= MAIN CHAT ========= */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      backdrop-filter: blur(20px);
      margin: 12px 12px 12px 0;
      border-radius: 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: var(--header-bg);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    .model-badge {
      font-size: 0.7rem;
      background: var(--accent);
      padding: 4px 12px;
      border-radius: 40px;
      color: #1a0b1e;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .icon-btn {
      background: transparent;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text-secondary);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover {
      background: var(--accent);
      color: #1a0b1e;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeIn 0.2s;
    }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }
    .bubble {
      padding: 10px 16px;
      border-radius: 22px;
      line-height: 1.5;
      font-size: 0.9rem;
      background: var(--assistant-msg-bg);
      border: 1px solid var(--border);
      word-break: break-word;
    }
    .user .bubble { background: var(--user-msg-bg); border-bottom-right-radius: 6px; }
    .assistant .bubble { border-bottom-left-radius: 6px; }
    .message-meta {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      font-size: 0.65rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .message-buttons {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .msg-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.65rem;
      cursor: pointer;
      color: var(--text-secondary);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .msg-btn i { font-size: 0.8rem; }

    /* Input area */
    .input-area {
      padding: 12px 20px 20px;
      background: var(--surface-solid);
      border-top: 1px solid var(--border);
    }
    .input-wrapper {
      display: flex;
      gap: 8px;
      background: var(--bg);
      border-radius: 40px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      background: transparent;
      border: none;
      padding: 10px 4px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      outline: none;
      color: var(--text);
      max-height: 120px;
    }
    .input-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .char-counter {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }
    .send-btn, .stop-btn {
      background: var(--accent);
      border: none;
      border-radius: 40px;
      padding: 8px 16px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .stop-btn { background: #ff4444; color: white; }

    /* ========= GEMINI-LIKE CANVAS (SIDE PANEL) ========= */
    .canvas-panel {
      position: fixed;
      top: 0;
      right: -100%;
      width: 70%;
      max-width: 800px;
      height: 100vh;
      background: var(--surface-solid);
      backdrop-filter: blur(32px);
      border-left: 1px solid var(--border);
      box-shadow: -8px 0 24px rgba(0,0,0,0.2);
      z-index: 1500;
      display: flex;
      flex-direction: column;
      transition: right 0.3s ease;
      border-radius: 28px 0 0 28px;
    }
    .canvas-panel.open { right: 0; }
    .canvas-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .canvas-header h3 { font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
    .canvas-body {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }
    .code-area {
      flex: 1;
      background: #0f0f0f;
      color: #f8e8ff;
      padding: 16px;
      overflow: auto;
      font-family: monospace;
      white-space: pre-wrap;
      font-size: 0.8rem;
      border-right: 1px solid #2a2a2a;
    }
    .preview-area {
      flex: 1;
      background: white;
    }
    .preview-area iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .canvas-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    .canvas-footer button {
      background: var(--accent);
      border: none;
      border-radius: 32px;
      padding: 6px 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    @media (max-width: 720px) {
      .canvas-panel { width: 100%; border-radius: 20px 0 0 20px; }
      .sidebar { width: 260px; }
      .message { max-width: 95%; }
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px);} to { opacity:1; transform:translateY(0);} }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 8px; }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo-area"><h2>Zkita AI</h2><p>by xkitz7</p></div>
    <button class="settings-sidebar-btn" id="settingsSidebarBtn"><i class="mgc_settings_line"></i></button>
  </div>
  <button class="new-chat-btn" id="newChatBtn"><i class="mgc_add_line"></i> New Chat</button>
  <input type="text" id="searchHistoryInput" class="search-history" placeholder="Search conversations...">
  <div class="history-section" id="historySidebar"></div>
  <div class="user-profile">
    <div class="avatar"><i class="mgc_user_3_line"></i></div>
    <div class="username">xkitz7</div>
  </div>
</div>

<div class="main">
  <div class="chat-header">
    <div class="model-badge"><i class="mgc_bot_line"></i> Mistral Small</div>
    <div class="header-actions">
      <button class="icon-btn" id="exportChatsBtn" title="Export all chats"><i class="mgc_download_line"></i></button>
      <button class="icon-btn" id="reloadLastBtn" title="Relast last response"><i class="mgc_refresh_line"></i></button>
    </div>
  </div>
  <div class="chat-container" id="chatContainer"></div>
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="messageInput" placeholder="Ask me anything..." rows="1"></textarea>
      <div class="input-actions">
        <span class="char-counter" id="charCounter">0</span>
        <button class="icon-btn" id="voiceInputBtn"><i class="mgc_mic_line"></i></button>
        <button class="send-btn" id="sendBtn"><i class="mgc_send_line"></i> Send</button>
        <button class="stop-btn" id="stopBtn" style="display:none;"><i class="mgc_close_line"></i> Stop</button>
      </div>
    </div>
  </div>
</div>

<!-- Side Canvas for Code Testing (Gemini-like) -->
<div id="codeCanvas" class="canvas-panel">
  <div class="canvas-header">
    <h3><i class="mgc_code_line"></i> Code Canvas</h3>
    <button class="icon-btn" id="closeCanvasBtn"><i class="mgc_close_line"></i></button>
  </div>
  <div class="canvas-body">
    <div class="code-area" id="canvasCodePanel"></div>
    <div class="preview-area"><iframe id="canvasPreview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe></div>
  </div>
  <div class="canvas-footer">
    <button id="copyCanvasCodeBtn"><i class="mgc_copy_line"></i> Copy</button>
    <button id="runCanvasBtn" class="primary"><i class="mgc_play_line"></i> Run</button>
  </div>
</div>

<!-- Settings Modal (only theme and system prompt) -->
<div id="settingsModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:2000; justify-content:center; align-items:center;">
  <div class="modal-content" style="background:var(--surface-solid); border-radius:28px; width:90%; max-width:420px; padding:24px;">
    <div style="display:flex; justify-content:space-between; margin-bottom:16px;"><h3>Settings</h3><button id="closeModalBtn" style="background:none; border:none; font-size:1.4rem;">&times;</button></div>
    <label>Dark Mode</label>
    <select id="themeSelect" style="width:100%; padding:8px; border-radius:24px; margin-bottom:20px;"><option value="light">Light</option><option value="dark">Dark</option></select>
    <label>Custom System Prompt (ZKita's personality)</label>
    <textarea id="customSystemPrompt" rows="3" style="width:100%; border-radius:20px; padding:8px; background:var(--bg); color:var(--text); border:1px solid var(--border);"></textarea>
    <div style="margin-top:16px; display:flex; justify-content:flex-end;"><button id="saveSettingsBtn" style="background:var(--accent); border:none; padding:8px 20px; border-radius:40px;"><i class="mgc_save_line"></i> Save</button></div>
  </div>
</div>

<script>
  // ---------- DATA MODEL ----------
  let conversations = {};
  let currentChatId = null;
  let isLoading = false;
  let abortController = null;
  let userSystemPrompt = "";
  let autoScroll = true;
  let ttsEnabled = false;

  const STORAGE_KEY = 'zkita_deepseek_style';

  function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }

  function loadData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if(stored) {
      try {
        const data = JSON.parse(stored);
        conversations = data.conversations || {};
        userSystemPrompt = data.userSystemPrompt || "";
        if(Object.keys(conversations).length === 0) createDefaultChat();
      } catch(e) { createDefaultChat(); }
    } else { createDefaultChat(); }
    if(!conversations[currentChatId]) currentChatId = Object.keys(conversations)[0];
    saveToLocal();
  }
  function createDefaultChat() {
    const id = generateId();
    conversations = { [id]: { id, title: 'New Chat', messages: [], createdAt: Date.now(), updatedAt: Date.now(), pinned: false } };
    currentChatId = id;
  }
  function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ conversations, userSystemPrompt })); }

  // helpers
  function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
  function formatMessage(text) {
    let parsed = escapeHtml(text);
    parsed = parsed.replace(/```(\w*)\n([\s\S]*?)```/g, (m,lang,code) => `<pre><code class="language-${lang||'plaintext'}">${code}</code></pre>`);
    parsed = parsed.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
    parsed = parsed.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
    parsed = parsed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    parsed = parsed.replace(/\*(.*?)\*/g, '<em>$1</em>');
    parsed = parsed.replace(/\|\|(.*?)\|\|/g, '<span class="spoiler" style="background:#1a1a2e; color:#1a1a2e; cursor:pointer; border-radius:8px;" onclick="this.classList.add(\'revealed\')">$1</span>');
    parsed = parsed.replace(/\n/g, '<br>');
    return parsed;
  }
  function getTimestamp() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }

  function renderSidebar() {
    const container = document.getElementById('historySidebar');
    if(!container) return;
    const searchTerm = document.getElementById('searchHistoryInput')?.value.toLowerCase() || '';
    let chatsArray = Object.values(conversations).sort((a,b)=>b.updatedAt - a.updatedAt);
    if(searchTerm) chatsArray = chatsArray.filter(c => c.title.toLowerCase().includes(searchTerm));
    const today = [], other = [];
    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
    for(let chat of chatsArray) {
      if(chat.updatedAt >= todayStart) today.push(chat);
      else other.push(chat);
    }
    let html = `<div class="history-group"><h4>Today</h4><div class="history-list">`;
    for(let chat of today) html += renderChatItem(chat);
    html += `</div></div>`;
    if(other.length) {
      html += `<div class="history-group"><h4>Previous</h4><div class="history-list">`;
      for(let chat of other) html += renderChatItem(chat);
      html += `</div></div>`;
    }
    container.innerHTML = html;
    attachHistoryEvents();
  }
  function renderChatItem(chat) {
    const active = currentChatId === chat.id ? 'active' : '';
    return `<div class="history-item ${active}" data-id="${chat.id}">
      <span class="chat-title">${escapeHtml(chat.title)}</span>
      <div class="chat-actions">
        <i class="mgc_pushpin_line pin-icon" data-id="${chat.id}" data-pinned="${chat.pinned}"></i>
      </div>
    </div>`;
  }
  function attachHistoryEvents() {
    document.querySelectorAll('.history-item').forEach(el => {
      el.addEventListener('click', (e) => { if(!e.target.classList.contains('pin-icon')) switchChat(el.dataset.id); });
    });
    document.querySelectorAll('.pin-icon').forEach(icon => {
      icon.addEventListener('click', (e) => { e.stopPropagation(); togglePin(icon.dataset.id); });
    });
  }
  function togglePin(chatId) { if(conversations[chatId]) { conversations[chatId].pinned = !conversations[chatId].pinned; saveToLocal(); renderSidebar(); } }
  function switchChat(id) { if(conversations[id]) { currentChatId = id; renderMessages(); renderSidebar(); } }

  function renderMessages() {
    const container = document.getElementById('chatContainer');
    if(!container || !currentChatId || !conversations[currentChatId]) return;
    const msgs = conversations[currentChatId].messages;
    container.innerHTML = '';
    for(let msg of msgs) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${msg.role}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = formatMessage(msg.content);
      msgDiv.appendChild(bubble);
      const meta = document.createElement('div');
      meta.className = 'message-meta';
      meta.innerHTML = `<span>${msg.timestamp || getTimestamp()}</span><i class="mgc_pushpin_line pin-msg" style="cursor:pointer; opacity:${msg.pinned?1:0.5}"></i>`;
      const pinIcon = meta.querySelector('.pin-msg');
      pinIcon.onclick = () => { msg.pinned = !msg.pinned; saveToLocal(); renderMessages(); };
      msgDiv.appendChild(meta);
      const btns = document.createElement('div');
      btns.className = 'message-buttons';
      btns.innerHTML = `<button class="msg-btn" data-copy><i class="mgc_copy_line"></i> Copy</button>
                        <button class="msg-btn" data-download><i class="mgc_download_line"></i> Download</button>`;
      if(msg.role === 'assistant') {
        const hasCode = (msg.content.match(/```/g) || []).length >= 2;
        if(hasCode) btns.innerHTML += `<button class="msg-btn" data-test><i class="mgc_code_line"></i> Test</button>`;
        btns.innerHTML += `<button class="msg-btn" data-speak><i class="mgc_sound_line"></i> Speak</button>`;
      }
      msgDiv.appendChild(btns);
      container.appendChild(msgDiv);
    }
    // attach listeners
    document.querySelectorAll('.msg-btn[data-copy]').forEach(btn => btn.onclick = () => { const content = btn.closest('.message').querySelector('.bubble').innerText; navigator.clipboard.writeText(content); showToast('Copied!'); });
    document.querySelectorAll('.msg-btn[data-download]').forEach(btn => btn.onclick = () => { const content = btn.closest('.message').querySelector('.bubble').innerText; const blob = new Blob([content], {type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='ZKITA.txt'; a.click(); URL.revokeObjectURL(blob); });
    document.querySelectorAll('.msg-btn[data-test]').forEach(btn => btn.onclick = () => { const content = btn.closest('.message').querySelector('.bubble').innerText; extractAndOpenCanvas(content); });
    document.querySelectorAll('.msg-btn[data-speak]').forEach(btn => btn.onclick = () => { const content = btn.closest('.message').querySelector('.bubble').innerText; const utterance = new SpeechSynthesisUtterance(content); window.speechSynthesis.cancel(); window.speechSynthesis.speak(utterance); });
    document.querySelectorAll('.bubble pre code').forEach(block => hljs.highlightElement(block));
    if(autoScroll) container.scrollTop = container.scrollHeight;
  }

  // CANVAS (Gemini-like side panel)
  let currentCanvasCode = "";
  function extractAndOpenCanvas(text) {
    const codeMatch = text.match(/```(\w*)\n([\s\S]*?)```/);
    if(codeMatch) currentCanvasCode = codeMatch[2];
    else currentCanvasCode = text;
    document.getElementById('canvasCodePanel').innerHTML = `<pre style="margin:0; white-space:pre-wrap;">${escapeHtml(currentCanvasCode)}</pre>`;
    document.getElementById('canvasPreview').srcdoc = currentCanvasCode;
    document.getElementById('codeCanvas').classList.add('open');
  }
  document.getElementById('closeCanvasBtn').onclick = () => document.getElementById('codeCanvas').classList.remove('open');
  document.getElementById('runCanvasBtn').onclick = () => { document.getElementById('canvasPreview').srcdoc = currentCanvasCode; };
  document.getElementById('copyCanvasCodeBtn').onclick = () => { navigator.clipboard.writeText(currentCanvasCode); showToast('Code copied'); };

  // API call
  async function sendMessage(editedMsg = null) {
    if(isLoading) { showToast("Already generating..."); return; }
    const input = document.getElementById('messageInput');
    let text = editedMsg !== null ? editedMsg : input.value.trim();
    if(!text) return;
    if(editedMsg === null) input.value = '';
    document.getElementById('charCounter').innerText = '0';
    const chat = conversations[currentChatId];
    const userMsg = { role: 'user', content: text, timestamp: getTimestamp(), pinned: false };
    if(editedMsg === null) chat.messages.push(userMsg);
    chat.updatedAt = Date.now();
    if(chat.title === 'New Chat') chat.title = text.slice(0,30)+(text.length>30?'...':'');
    saveToLocal();
    renderMessages();
    renderSidebar();

    isLoading = true;
    document.getElementById('sendBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'inline-flex';
    abortController = new AbortController();
    const apiMessages = chat.messages.map(m => ({ role: m.role, content: m.content }));
    if(userSystemPrompt) apiMessages.unshift({ role: 'system', content: userSystemPrompt });
    try {
      const res = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ messages: apiMessages }), signal: abortController.signal });
      const data = await res.json();
      const reply = data.reply || "Sorry, no response.";
      chat.messages.push({ role: 'assistant', content: reply, timestamp: getTimestamp(), pinned: false });
      chat.updatedAt = Date.now();
      saveToLocal();
      renderMessages();
      renderSidebar();
      if(ttsEnabled && reply) new SpeechSynthesisUtterance(reply);
    } catch(err) {
      if(err.name !== 'AbortError') {
        chat.messages.push({ role: 'assistant', content: `Error: ${err.message}`, timestamp: getTimestamp() });
        saveToLocal();
        renderMessages();
      }
    } finally {
      isLoading = false;
      document.getElementById('sendBtn').style.display = 'inline-flex';
      document.getElementById('stopBtn').style.display = 'none';
      abortController = null;
      input.disabled = false;
      input.focus();
    }
  }
  function stopGeneration() { if(abortController) abortController.abort(); }
  function newChat() { const id = generateId(); conversations[id] = { id, title: 'New Chat', messages: [], createdAt: Date.now(), updatedAt: Date.now(), pinned: false }; saveToLocal(); switchChat(id); }
  function exportAllChats() { const data = JSON.stringify(conversations, null,2); const blob = new Blob([data], {type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`zkita_${Date.now()}.json`; a.click(); URL.revokeObjectURL(blob); showToast('Exported!'); }
  function reloadLastResponse() { /* simplified: remove last assistant message and re-send last user */ const chat = conversations[currentChatId]; if(chat.messages.length && chat.messages[chat.messages.length-1].role==='assistant') chat.messages.pop(); saveToLocal(); renderMessages(); const lastUser = chat.messages.filter(m=>m.role==='user').pop(); if(lastUser) sendMessage(lastUser.content); }
  function startVoiceInput() { if(!('webkitSpeechRecognition' in window)) return alert("Voice not supported"); const rec = new webkitSpeechRecognition(); rec.lang='en-US'; rec.onresult=e=>{ document.getElementById('messageInput').value = e.results[0][0].transcript; document.getElementById('charCounter').innerText = e.results[0][0].transcript.length; }; rec.start(); }

  // Settings modal
  const modal = document.getElementById('settingsModal');
  document.getElementById('settingsSidebarBtn').onclick = () => modal.style.display='flex';
  document.getElementById('closeModalBtn').onclick = () => modal.style.display='none';
  document.getElementById('saveSettingsBtn').onclick = () => {
    userSystemPrompt = document.getElementById('customSystemPrompt').value;
    const theme = document.getElementById('themeSelect').value;
    if(theme === 'dark') document.body.classList.add('dark');
    else document.body.classList.remove('dark');
    localStorage.setItem('zkita_theme', theme);
    saveToLocal();
    modal.style.display='none';
    showToast('Settings saved');
  };
  function initTheme() { const saved = localStorage.getItem('zkita_theme'); if(saved === 'dark') document.body.classList.add('dark'); else document.body.classList.remove('dark'); }
  function showToast(msg) { const t=document.createElement('div'); t.className='toast'; t.innerText=msg; t.style.position='fixed'; t.style.bottom='20px'; t.style.left='50%'; t.style.transform='translateX(-50%)'; t.style.background='var(--accent)'; t.style.padding='8px 20px'; t.style.borderRadius='40px'; t.style.zIndex='3000'; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }

  // Event binding
  document.getElementById('sendBtn').onclick = () => sendMessage();
  document.getElementById('stopBtn').onclick = stopGeneration;
  document.getElementById('newChatBtn').onclick = newChat;
  document.getElementById('exportChatsBtn').onclick = exportAllChats;
  document.getElementById('reloadLastBtn').onclick = reloadLastResponse;
  document.getElementById('voiceInputBtn').onclick = startVoiceInput;
  document.getElementById('messageInput').addEventListener('input', function(e) { document.getElementById('charCounter').innerText = this.value.length; });
  document.getElementById('messageInput').addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  document.getElementById('searchHistoryInput').addEventListener('input', () => renderSidebar());

  loadData();
  initTheme();
  renderMessages();
  renderSidebar();
</script>
</body>
</html>
