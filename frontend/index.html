<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Zkita AI · by xkitz7</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/css/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- MingCute Icon Font -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mingcute_icon@1.0.0/css/mingcute.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #faf0ff;
      --surface: rgba(255, 245, 255, 0.68);
      --surface-solid: #fff0fe;
      --sidebar-bg: #fff5fe;
      --text: #1a0b1e;
      --text-secondary: #6b4e7e;
      --accent: #c084fc;
      --accent-hover: #a855f7;
      --border: rgba(0, 0, 0, 0.06);
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.04);
      --user-msg-bg: #e9d5ff;
      --assistant-msg-bg: #ffffffcc;
      --code-bg: #f3e8ff;
      --scrollbar: #d9c7f0;
    }

    body.dark {
      --bg: #0a0a0f;
      --surface: rgba(18, 18, 28, 0.75);
      --surface-solid: #12121c;
      --sidebar-bg: #0f0f18;
      --text: #f0e6ff;
      --text-secondary: #a78bc7;
      --accent: #d780ff;
      --accent-hover: #e09eff;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
      --user-msg-bg: #2e1a47;
      --assistant-msg-bg: #1e102ccc;
      --code-bg: #1e1730;
      --scrollbar: #3c2a4a;
    }

    body {
      background: var(--bg);
      font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;
      color: var(--text);
      height: 100vh;
      display: flex;
      transition: background 0.2s;
      overflow: hidden;
    }

    /* ========= SIDEBAR ========= */
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 12px;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }

    .search-wrapper {
      position: relative;
      margin-bottom: 24px;
    }
    .search-wrapper i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 1rem;
    }
    #searchHistoryInput {
      width: 100%;
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 10px 12px 10px 36px;
      font-size: 0.8rem;
      color: var(--text);
      outline: none;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin: 16px 8px 8px 8px;
    }
    .section-header h4 {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }
    .new-chat-icon {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 1rem;
      transition: 0.1s;
      padding: 2px;
      border-radius: 20px;
    }
    .new-chat-icon:hover {
      background: var(--accent);
      color: #1a0b1e;
    }

    .history-section {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 28px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: 0.1s;
      color: var(--text);
      position: relative;
    }
    .history-item:hover {
      background: var(--accent);
      color: #1a0b1e;
    }
    .history-item.active {
      background: var(--accent);
      color: #1a0b1e;
      font-weight: 500;
    }
    .chat-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-more {
      font-size: 1rem;
      cursor: pointer;
      padding: 0 6px;
      opacity: 0.6;
      border-radius: 20px;
    }

    .dropdown-menu {
      position: fixed;
      background: var(--surface-solid);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 6px 0;
      z-index: 1200;
      min-width: 140px;
    }
    .dropdown-menu div {
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text);
    }
    .dropdown-menu div:hover {
      background: var(--accent);
      color: #1a0b1e;
    }

    .user-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .avatar {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar i { font-size: 1.2rem; color: #1a0b1e; }
    .username { font-size: 0.8rem; font-weight: 500; }
    .footer-actions {
      display: flex;
      gap: 12px;
    }
    .footer-actions button {
      background: transparent;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 4px;
      border-radius: 50%;
    }
    .footer-actions button:hover {
      background: var(--accent);
      color: #1a0b1e;
    }

    /* ========= MAIN CHAT ========= */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      backdrop-filter: blur(20px);
      margin: 12px 12px 12px 0;
      border-radius: 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: transparent;
    }
    .chat-name {
      font-size: 0.9rem;
      font-weight: 500;
      background: var(--accent);
      padding: 6px 16px;
      border-radius: 40px;
      color: #1a0b1e;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .logo-badge {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-badge h2 {
      font-size: 1.2rem;
      background: linear-gradient(135deg, var(--accent), #b77dff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeIn 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }
    .bubble {
      padding: 12px 18px;
      border-radius: 22px;
      line-height: 1.6;
      font-size: 0.95rem;
      background: var(--assistant-msg-bg);
      border: 1px solid var(--border);
      word-break: break-word;
    }
    .user .bubble { background: var(--user-msg-bg); border-bottom-right-radius: 6px; }
    .assistant .bubble { border-bottom-left-radius: 6px; }

    .message-meta {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      font-size: 0.65rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .message-buttons {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .msg-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.7rem;
      cursor: pointer;
      color: var(--text-secondary);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }
    .msg-btn:hover {
      background: var(--accent);
      color: #1a0b1e;
      border-color: transparent;
    }

    .input-area {
      padding: 12px 20px 20px;
      background: var(--surface-solid);
      border-top: 1px solid var(--border);
    }
    .input-wrapper {
      display: flex;
      gap: 8px;
      background: var(--bg);
      border-radius: 40px;
      padding: 8px 16px;
      border: 1px solid var(--border);
      align-items: flex-end;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }
    textarea {
      flex: 1;
      background: transparent;
      border: none;
      padding: 8px 4px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: none;
      outline: none;
      color: var(--text);
      max-height: 150px;
    }
    .input-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 4px;
    }
    .char-counter { font-size: 0.7rem; color: var(--text-secondary); }
    .send-btn, .stop-btn {
      background: var(--accent);
      border: none;
      border-radius: 40px;
      padding: 8px 18px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: filter 0.2s;
      color: #1a0b1e;
    }
    .send-btn:hover { filter: brightness(1.1); }
    .stop-btn { background: #ff4444; color: white; }

    /* Canvas panel */
    .canvas-panel {
      position: fixed;
      top: 0;
      right: -100%;
      width: 80%;
      max-width: 900px;
      height: 100vh;
      background: var(--surface-solid);
      backdrop-filter: blur(32px);
      border-left: 1px solid var(--border);
      box-shadow: -8px 0 32px rgba(0,0,0,0.15);
      z-index: 1500;
      display: flex;
      flex-direction: column;
      transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .canvas-panel.open { right: 0; }
    .canvas-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .canvas-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .code-area {
      flex: 1;
      background: #0d0d12;
      color: #e0d0ff;
      padding: 20px;
      overflow: auto;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .preview-area {
      flex: 1;
      background: white;
      position: relative;
    }
    .preview-area iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .canvas-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    .canvas-footer button {
      padding: 8px 16px;
      border-radius: 40px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
    }

    /* Modal settings */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: var(--surface-solid);
      border-radius: 28px;
      width: 90%;
      max-width: 450px;
      padding: 32px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    
    .loading-dots::after {
      content: '.';
      animation: dots 1s steps(5, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60% { content: '...'; }
      80%, 100% { content: ''; }
    }

    @media (max-width: 768px) {
      .sidebar { 
        position: fixed;
        left: -280px;
        z-index: 1000;
        height: 100%;
      }
      .sidebar.active { left: 0; }
      .main { margin: 12px; }
      .canvas-panel { width: 100%; }
      .message { max-width: 95%; }
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(8px);} to { opacity:1; transform:translateY(0);} }
    
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 10px; }
    
    pre {
      background: var(--code-bg);
      padding: 12px;
      border-radius: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    code.inline-code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="search-wrapper">
    <i class="mgc_search_line"></i>
    <input type="text" id="searchHistoryInput" placeholder="Find a conversation">
  </div>

  <div class="section-header">
    <h4>TODAY</h4>
    <button class="new-chat-icon" id="newChatBtn"><i class="mgc_add_line"></i></button>
  </div>
  <div id="todayList" class="history-list"></div>

  <div class="section-header">
    <h4>YESTERDAY</h4>
  </div>
  <div id="yesterdayList" class="history-list"></div>

  <div class="section-header">
    <h4>PREVIOUS</h4>
  </div>
  <div id="previousList" class="history-list"></div>

  <div class="user-footer">
    <div class="user-info">
      <div class="avatar"><i class="mgc_user_3_line"></i></div>
      <span class="username">xkitz7</span>
    </div>
    <div class="footer-actions">
      <button id="voiceFooterBtn" title="Voice input"><i class="mgc_mic_line"></i></button>
      <button id="exportFooterBtn" title="Export all chats"><i class="mgc_download_line"></i></button>
      <button id="settingsFooterBtn" title="Settings"><i class="mgc_settings_line"></i></button>
    </div>
  </div>
</div>

<div class="main">
  <div class="chat-header">
    <div class="chat-name" id="currentChatName">New Chat</div>
    <div class="logo-badge"><h2>Zkita AI</h2></div>
  </div>
  <div class="chat-container" id="chatContainer"></div>
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="messageInput" placeholder="Ask me anything..." rows="1"></textarea>
      <div class="input-actions">
        <span class="char-counter" id="charCounter">0</span>
        <button class="send-btn" id="sendBtn"><i class="mgc_send_line"></i> Send</button>
        <button class="stop-btn" id="stopBtn" style="display:none;"><i class="mgc_close_line"></i> Stop</button>
      </div>
    </div>
  </div>
</div>

<!-- Canvas panel for code testing -->
<div id="codeCanvas" class="canvas-panel">
  <div class="canvas-header">
    <h3><i class="mgc_code_line"></i> Code Canvas</h3>
    <button class="close-canvas" style="background:none; border:none; cursor:pointer; font-size:1.5rem;"><i class="mgc_close_line"></i></button>
  </div>
  <div class="canvas-body">
    <div class="code-area" id="canvasCodePanel"></div>
    <div class="preview-area"><iframe id="canvasPreview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe></div>
  </div>
  <div class="canvas-footer">
    <button id="copyCanvasCodeBtn"><i class="mgc_copy_line"></i> Copy</button>
    <button id="runCanvasBtn" style="background: var(--accent); border-color: transparent;"><i class="mgc_play_line"></i> Run</button>
  </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal">
  <div class="modal-content">
    <h3 style="margin-bottom: 20px;">Settings</h3>
    <div style="margin-bottom: 16px;">
      <label style="display:block; margin-bottom: 6px; font-size: 0.9rem;">Theme</label>
      <select id="themeSelect" style="width:100%; padding:10px; border-radius:12px; background: var(--bg); color: var(--text); border: 1px solid var(--border);">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </div>
    <div style="margin-bottom: 16px;">
      <label style="display:block; margin-bottom: 6px; font-size: 0.9rem;">Custom System Prompt</label>
      <textarea id="customSystemPrompt" rows="3" style="width:100%; border-radius:12px; padding:10px; background:var(--bg); color:var(--text); border:1px solid var(--border);" placeholder="You are a helpful assistant..."></textarea>
    </div>
    <div style="display:flex; justify-content: flex-end; gap: 10px;">
      <button id="closeModalBtn" style="background:none; border:none; cursor:pointer;">Cancel</button>
      <button id="saveSettingsBtn" style="background:var(--accent); border:none; padding:10px 24px; border-radius:40px; cursor:pointer; font-weight:600;">Save Changes</button>
    </div>
  </div>
</div>

<script>
  // ---------- CONFIG & STATE ----------
  const apiKey = ""; // Provided by environment
  const STORAGE_KEY = 'zkita_v3_stable';
  
  let conversations = {};
  let currentChatId = null;
  let isLoading = false;
  let abortController = null;
  let userSystemPrompt = "";
  let autoScroll = true;

  // ---------- CORE LOGIC ----------

  function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }

  function loadData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if(stored) {
      try {
        const data = JSON.parse(stored);
        conversations = data.conversations || {};
        userSystemPrompt = data.userSystemPrompt || "";
      } catch(e) { 
        createDefaultChat(); 
      }
    }
    
    if(Object.keys(conversations).length === 0) {
      createDefaultChat();
    } else {
      currentChatId = Object.keys(conversations).sort((a,b) => conversations[b].updatedAt - conversations[a].updatedAt)[0];
    }
    saveToLocal();
  }

  function createDefaultChat() {
    const id = generateId();
    conversations[id] = { 
      id, 
      title: 'New Chat', 
      messages: [], 
      createdAt: Date.now(), 
      updatedAt: Date.now(), 
      pinned: false 
    };
    currentChatId = id;
  }

  function saveToLocal() { 
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ conversations, userSystemPrompt })); 
  }

  function getDateCategory(timestamp) {
    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
    const yesterdayStart = todayStart - 86400000;
    if(timestamp >= todayStart) return 'today';
    if(timestamp >= yesterdayStart) return 'yesterday';
    return 'previous';
  }

  function renderSidebar() {
    const searchTerm = document.getElementById('searchHistoryInput').value.toLowerCase();
    let chatsArray = Object.values(conversations).sort((a,b)=>b.updatedAt - a.updatedAt);
    if(searchTerm) chatsArray = chatsArray.filter(c => c.title.toLowerCase().includes(searchTerm));

    const groups = { today: [], yesterday: [], previous: [] };
    chatsArray.forEach(chat => {
      groups[getDateCategory(chat.updatedAt)].push(chat);
    });

    ['todayList', 'yesterdayList', 'previousList'].forEach(id => {
      const container = document.getElementById(id);
      const cat = id.replace('List', '');
      const chats = groups[cat];
      
      if(chats.length === 0) {
        container.innerHTML = '<div style="padding:8px 12px; opacity:0.4; font-size:0.75rem;">No conversations</div>';
        return;
      }

      container.innerHTML = chats.map(chat => `
        <div class="history-item ${currentChatId === chat.id ? 'active' : ''}" data-id="${chat.id}">
          <span class="chat-title">${escapeHtml(chat.title)}</span>
          <i class="mgc_more_2_line chat-more" data-id="${chat.id}"></i>
        </div>
      `).join('');
    });

    // Events
    document.querySelectorAll('.history-item').forEach(el => {
      el.addEventListener('click', (e) => {
        if(!e.target.classList.contains('chat-more')) switchChat(el.dataset.id);
      });
    });

    document.querySelectorAll('.chat-more').forEach(icon => {
      icon.onclick = (e) => {
        e.stopPropagation();
        const rect = icon.getBoundingClientRect();
        showChatMenu(icon.dataset.id, rect.left, rect.bottom);
      };
    });
  }

  function showChatMenu(chatId, x, y) {
    document.querySelectorAll('.dropdown-menu').forEach(m => m.remove());
    const menu = document.createElement('div');
    menu.className = 'dropdown-menu';
    menu.style.left = `${Math.max(10, x - 120)}px`;
    menu.style.top = `${y + 8}px`;
    menu.innerHTML = `
      <div onclick="renameChat('${chatId}')"><i class="mgc_edit_line"></i> Rename</div>
      <div onclick="deleteChat('${chatId}')" style="color:#ff6666;"><i class="mgc_delete_line"></i> Delete</div>
    `;
    document.body.appendChild(menu);
    setTimeout(() => {
      window.onclick = () => { menu.remove(); window.onclick = null; };
    }, 0);
  }

  window.renameChat = (chatId) => {
    const name = prompt("Rename conversation:", conversations[chatId].title);
    if(name && name.trim()) {
      conversations[chatId].title = name.trim();
      saveToLocal();
      renderSidebar();
      if(currentChatId === chatId) document.getElementById('currentChatName').innerText = name;
    }
  };

  window.deleteChat = (chatId) => {
    if(Object.keys(conversations).length <= 1) {
      conversations[chatId].messages = [];
      conversations[chatId].title = "New Chat";
    } else {
      delete conversations[chatId];
      if(currentChatId === chatId) currentChatId = Object.keys(conversations)[0];
    }
    saveToLocal();
    renderSidebar();
    renderMessages();
  };

  function switchChat(id) {
    currentChatId = id;
    document.getElementById('currentChatName').innerText = conversations[id].title;
    renderMessages();
    renderSidebar();
  }

  // ---------- API INTEGRATION ----------

  async function callGemini(messages) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
    
    const payload = {
      contents: messages.map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.content }]
      })),
      systemInstruction: userSystemPrompt ? { parts: [{ text: userSystemPrompt }] } : undefined
    };

    const maxRetries = 5;
    for (let i = 0; i < maxRetries; i++) {
      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          signal: abortController.signal
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const result = await response.json();
        return result.candidates?.[0]?.content?.parts?.[0]?.text || "No response generated.";
      } catch (err) {
        if (err.name === 'AbortError') throw err;
        if (i === maxRetries - 1) throw err;
        await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
      }
    }
  }

  async function sendMessage() {
    if(isLoading) return;
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if(!text) return;

    input.value = '';
    document.getElementById('charCounter').innerText = '0';
    input.style.height = 'auto';

    const chat = conversations[currentChatId];
    chat.messages.push({ role: 'user', content: text, timestamp: getTimestamp() });
    chat.updatedAt = Date.now();
    
    if(chat.title === 'New Chat') {
      chat.title = text.length > 30 ? text.substring(0, 30) + '...' : text;
    }

    saveToLocal();
    renderMessages();
    renderSidebar();

    isLoading = true;
    document.getElementById('sendBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'inline-flex';
    
    // Add temporary loading bubble
    const container = document.getElementById('chatContainer');
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'message assistant loading-msg';
    loadingDiv.innerHTML = `<div class="bubble loading-dots">Thinking</div>`;
    container.appendChild(loadingDiv);
    container.scrollTop = container.scrollHeight;

    abortController = new AbortController();

    try {
      const response = await callGemini(chat.messages);
      loadingDiv.remove();
      chat.messages.push({ role: 'assistant', content: response, timestamp: getTimestamp() });
      chat.updatedAt = Date.now();
      saveToLocal();
      renderMessages();
      renderSidebar();
    } catch (err) {
      loadingDiv.remove();
      if(err.name !== 'AbortError') {
        const errorMsg = "Sorry, I encountered an error. Please check your connection and try again.";
        chat.messages.push({ role: 'assistant', content: `Error: ${errorMsg}`, timestamp: getTimestamp() });
        renderMessages();
      }
    } finally {
      isLoading = false;
      document.getElementById('sendBtn').style.display = 'inline-flex';
      document.getElementById('stopBtn').style.display = 'none';
      abortController = null;
    }
  }

  // ---------- UTILS ----------

  function escapeHtml(str) { 
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); 
  }

  function formatMessage(text) {
    let parsed = escapeHtml(text);
    // Code blocks
    parsed = parsed.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
      return `<pre><code class="language-${lang || 'plaintext'}">${code}</code></pre>`;
    });
    // Inline code
    parsed = parsed.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
    // Bold/Italic
    parsed = parsed.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
    parsed = parsed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    parsed = parsed.replace(/\*(.*?)\*/g, '<em>$1</em>');
    // Newlines
    parsed = parsed.replace(/\n/g, '<br>');
    return parsed;
  }

  function getTimestamp() { 
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); 
  }

  function renderMessages() {
    const container = document.getElementById('chatContainer');
    if(!container || !currentChatId) return;
    
    const msgs = conversations[currentChatId].messages;
    container.innerHTML = msgs.map((msg, idx) => `
      <div class="message ${msg.role}">
        <div class="bubble">${formatMessage(msg.content)}</div>
        <div class="message-meta">
          <span>${msg.timestamp}</span>
        </div>
        <div class="message-buttons">
          <button class="msg-btn" onclick="copyText(this)"><i class="mgc_copy_line"></i> Copy</button>
          ${msg.role === 'assistant' && msg.content.includes('```') ? 
            `<button class="msg-btn" onclick="testCode(${idx})"><i class="mgc_code_line"></i> Test Code</button>` : ''}
        </div>
      </div>
    `).join('');
    
    document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    container.scrollTop = container.scrollHeight;
  }

    const original = btn.innerHTML;
    btn.innerHTML = '<i class="mgc_check_line"></i> Copied';
    setTimeout(() => btn.innerHTML = original, 2000);
  };
