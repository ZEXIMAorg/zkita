<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZKita AI · Fluid UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: #0F0D11;
            color: #F9EBFF;
            overflow: hidden;
            height: 100vh;
            transition: background-color 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        body.solid-bg {
            background-color: #100D11;
        }

        ::selection {
            background-color: #EFC0FF;
            color: #100D11;
        }

        .layout-wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Sidebar */
        #sidebar {
            width: 300px;
            background-color: rgba(15, 13, 17, 0.7);
            backdrop-filter: blur(32px);
            border-right: 1px solid rgba(249, 235, 255, 0.04);
            display: flex;
            flex-direction: column;
            z-index: 50;
            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 40px;
            position: relative;
            background-color: transparent;
            overflow: hidden;
        }

        /* Chat area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            width: 100%;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 20px 10px 10px 10px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeInUp 0.3s ease;
        }
        .message.user {
            align-self: flex-end;
        }
        .message.assistant {
            align-self: flex-start;
        }
        .bubble {
            padding: 12px 18px;
            border-radius: 26px;
            font-size: 0.95rem;
            line-height: 1.5;
            background: rgba(249, 235, 255, 0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(249, 235, 255, 0.1);
        }
        .user .bubble {
            background: #6D28D9; /* solid */
            border: none;
            border-bottom-right-radius: 6px;
        }
        .assistant .bubble {
            border-bottom-left-radius: 6px;
        }
        .message-meta {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            font-size: 0.65rem;
            color: rgba(249, 235, 255, 0.4);
            margin-top: 4px;
            margin-left: 12px;
        }
        .message-actions {
            display: flex;
            gap: 10px;
            margin-top: 6px;
            justify-content: flex-end;
        }
        .assistant .message-actions {
            justify-content: flex-start;
        }
        .msg-action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 8px;
            color: rgba(249, 235, 255, 0.5);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
        }
        .msg-action-btn:hover {
            background: rgba(249, 235, 255, 0.1);
            color: #F9EBFF;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(249, 235, 255, 0.05);
            border-radius: 40px;
            width: fit-content;
            border: 1px solid rgba(249, 235, 255, 0.1);
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #EFC0FF;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Aurora background */
        .aurora-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            filter: blur(120px);
            opacity: 0.15;
            transition: opacity 0.8s;
        }
        body.solid-bg .aurora-bg {
            opacity: 0;
        }
        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            animation: move 25s infinite alternate ease-in-out;
        }
        .blob-1 { background: #EFC0FF; top: -10%; left: -10%; }
        .blob-2 { background: #6D28D9; bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(150px, 100px) scale(1.3); }
        }

        /* Sidebar components */
        .sidebar-header {
            padding: 24px 20px 10px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .new-chat-btn {
            background-color: #F9EBFF;
            color: #100D11;
            font-weight: 600;
            font-size: 15px;
            width: 100%;
            height: 54px;
            border-radius: 27px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border: none;
            cursor: pointer;
        }
        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(249, 235, 255, 0.15);
            filter: brightness(1.08);
        }
        .sidebar-search-wrapper {
            position: relative;
        }
        .sidebar-search {
            width: 100%;
            height: 40px;
            background-color: rgba(249, 235, 255, 0.05);
            border: 1px solid rgba(249, 235, 255, 0.6);
            border-radius: 20px;
            padding: 0 16px 0 38px;
            font-size: 14px;
            color: #F9EBFF;
            outline: none;
            transition: all 0.3s;
        }
        .sidebar-search:focus {
            background-color: rgba(249, 235, 255, 0.08);
            border-color: rgba(249, 235, 255, 1);
            box-shadow: 0 0 15px rgba(249, 235, 255, 0.25);
        }
        .search-icon-sidebar {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(249, 235, 255, 0.8);
            pointer-events: none;
        }
        .history-item {
            padding: 12px 18px;
            margin: 2px 12px;
            border-radius: 14px;
            font-size: 14.5px;
            color: rgba(249, 235, 255, 0.45);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.4s;
            position: relative;
        }
        .history-item:hover {
            background-color: rgba(249, 235, 255, 0.05);
            color: #F9EBFF;
            padding-left: 22px;
        }
        .options-trigger {
            opacity: 0;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            color: rgba(249, 235, 255, 0.4);
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .history-item:hover .options-trigger { opacity: 1; }

        /* Dropdown menu (three-dots options) */
        .dropdown-menu {
            position: fixed;
            background: #1E1A24;
            backdrop-filter: blur(32px);
            border: 1px solid rgba(249, 235, 255, 0.1);
            border-radius: 20px;
            padding: 8px;
            min-width: 160px;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeInScale 0.2s ease;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .dropdown-item {
            padding: 10px 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            color: rgba(249, 235, 255, 0.8);
            transition: background 0.2s;
        }
        .dropdown-item:hover {
            background: rgba(249, 235, 255, 0.1);
            color: #F9EBFF;
        }
        .dropdown-item.delete:hover {
            background: rgba(248, 113, 113, 0.15);
            color: #f87171;
        }

        /* Custom modals (rename, delete, edit message) */
        .custom-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeInModal 0.2s ease;
        }
        @keyframes fadeInModal {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-card {
            background: #1E1A24;
            border-radius: 32px;
            width: 90%;
            max-width: 400px;
            padding: 24px;
            border: 1px solid rgba(249, 235, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transform: scale(0.95);
            animation: modalPop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes modalPop {
            to { transform: scale(1); }
        }
        .modal-card h3 {
            font-size: 1.4rem;
            margin-bottom: 16px;
        }
        .modal-card input, .modal-card textarea {
            width: 100%;
            background: rgba(249, 235, 255, 0.1);
            border: 1px solid rgba(249, 235, 255, 0.2);
            border-radius: 24px;
            padding: 12px 16px;
            color: #F9EBFF;
            font-size: 1rem;
            margin-bottom: 20px;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .modal-buttons button {
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            border: none;
        }
        .modal-buttons .cancel-btn {
            background: transparent;
            border: 1px solid rgba(249, 235, 255, 0.3);
            color: #F9EBFF;
        }
        .modal-buttons .confirm-btn {
            background: #EFC0FF;
            color: #100D11;
        }
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E1A24;
            border: 1px solid rgba(249, 235, 255, 0.2);
            border-radius: 40px;
            padding: 10px 24px;
            font-size: 0.85rem;
            color: #F9EBFF;
            backdrop-filter: blur(12px);
            z-index: 2100;
            animation: toastSlide 0.3s ease forwards;
        }
        @keyframes toastSlide {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Input area */
        .search-container {
            position: relative;
            z-index: 10;
            background-color: rgba(22, 18, 24, 0.6);
            backdrop-filter: blur(60px);
            border: 1px solid rgba(249, 235, 255, 0.08);
            width: 100%;
            max-width: 780px;
            border-radius: 34px;
            padding: 26px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            transition: all 0.6s;
            overflow: hidden;
        }
        .search-container::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, #6D28D9 0%, #EFC0FF 30%, transparent 70%);
            opacity: 0.04;
            filter: blur(80px);
            z-index: -1;
            animation: rotateShift 15s linear infinite;
            pointer-events: none;
        }
        @keyframes rotateShift {
            from { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            to { transform: rotate(360deg) scale(1); }
        }
        textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            color: #F9EBFF;
            font-size: 18px;
            line-height: 1.6;
            max-height: 280px;
        }
        .plus-button, .mic-button {
            background-color: rgba(249, 235, 255, 0.04);
            border: 1px solid rgba(249, 235, 255, 0.08);
            color: rgba(249, 235, 255, 0.6);
            transition: all 0.4s;
            cursor: pointer;
        }
        .plus-button:hover, .mic-button:hover {
            background-color: rgba(249, 235, 255, 0.1);
            transform: translateY(-2px) scale(1.05);
            color: #F9EBFF;
        }
        #sendBtn {
            cursor: default;
            color: rgba(249, 235, 255, 0.1);
            transition: all 0.4s;
            background: transparent;
            border: none;
        }
        #sendBtn.active {
            color: #100D11;
            background-color: #F9EBFF;
            cursor: pointer;
            border-radius: 14px;
            transform: scale(1.1);
        }
        .disclaimer {
            font-size: 11px;
            color: rgba(249, 235, 255, 0.2);
            text-align: center;
            margin-top: 18px;
        }
        .hidden-title { display: none; }
        #historyContainer::-webkit-scrollbar { width: 4px; }
        #historyContainer::-webkit-scrollbar-thumb { background: rgba(249, 235, 255, 0.05); border-radius: 10px; }
    </style>
</head>
<body>

<div class="layout-wrapper">
    <aside id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Chat
            </button>
            <div class="sidebar-search-wrapper">
                <svg class="search-icon-sidebar" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" class="sidebar-search" placeholder="Search chats...">
            </div>
        </div>
        <div id="historyContainer" class="flex-1 overflow-y-auto pb-8"></div>
    </aside>

    <main class="main-content">
        <div class="aurora-bg">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>
        <div class="w-full flex flex-col items-center relative z-10 h-full justify-center">
            <h1 id="welcomeTitle" class="text-5xl font-medium mb-16 tracking-tight text-[#F9EBFF] text-center opacity-90">
                Hi there. Where should we dive today?
            </h1>
            <div id="chatMessages" class="chat-messages" style="display: none;"></div>
            <div class="search-container">
                <textarea id="messageInput" placeholder="Ask ZKita AI anything..." rows="1"></textarea>
                <div class="flex items-center justify-between mt-12">
                    <div class="flex items-center gap-3">
                        <button id="plusBtn" class="plus-button w-12 h-12 rounded-full flex items-center justify-center">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                        <button id="micBtn" class="mic-button w-12 h-12 rounded-full flex items-center justify-center">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                        </button>
                    </div>
                    <button id="sendBtn" class="w-12 h-12 flex items-center justify-center transition-all">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2 12L22 2L15 22L11 13L2 12Z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </div>
            <p class="disclaimer">ZKita AI can make mistakes and will not have any liability for misuse, misinformation, or real-world use.</p>
        </div>
    </main>
</div>

<!-- Custom Modals (rename, delete, edit message) -->
<div id="renameModal" class="custom-modal">
    <div class="modal-card">
        <h3>Rename chat</h3>
        <input type="text" id="renameInput" placeholder="New name">
        <div class="modal-buttons">
            <button class="cancel-btn" id="cancelRenameBtn">Cancel</button>
            <button class="confirm-btn" id="confirmRenameBtn">Save</button>
        </div>
    </div>
</div>
<div id="deleteModal" class="custom-modal">
    <div class="modal-card">
        <h3>Delete chat</h3>
        <p style="margin-bottom: 20px;">Are you sure you want to delete this conversation? This action cannot be undone.</p>
        <div class="modal-buttons">
            <button class="cancel-btn" id="cancelDeleteBtn">Cancel</button>
            <button class="confirm-btn" id="confirmDeleteBtn">Delete</button>
        </div>
    </div>
</div>
<div id="editMessageModal" class="custom-modal">
    <div class="modal-card">
        <h3>Edit your message</h3>
        <textarea id="editMessageText" rows="4" placeholder="Edit your message..."></textarea>
        <div class="modal-buttons">
            <button class="cancel-btn" id="cancelEditBtn">Cancel</button>
            <button class="confirm-btn" id="confirmEditBtn">Finish</button>
        </div>
    </div>
</div>

<script>
    // ---------- STORAGE & STATE ----------
    let conversations = {};
    let currentChatId = null;
    let isLoading = false;
    let abortController = null;
    let pendingEditIndex = null;

    const STORAGE_KEY = 'zkita_neon_chats';

    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
    function getTimestamp() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }

    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                conversations = JSON.parse(stored);
            } catch(e) { conversations = {}; }
        }
        if (Object.keys(conversations).length === 0) {
            const newId = generateId();
            conversations[newId] = { id: newId, title: 'New Chat', messages: [], pinned: false, updatedAt: Date.now() };
            currentChatId = newId;
        } else {
            currentChatId = Object.keys(conversations)[0];
        }
        saveToLocal();
    }
    function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations)); }

    function setSolidBackground(enable) {
        if (enable) document.body.classList.add('solid-bg');
        else document.body.classList.remove('solid-bg');
    }

    // Custom toast
    function showToast(message, duration = 2000) {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.animation = 'toastSlide 0.3s reverse';
            setTimeout(() => toast.remove(), 300);
        }, duration);
    }

    // Sidebar rendering with dropdown menu (three dots) – no modal
    function renderSidebar() {
        const container = document.getElementById('historyContainer');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        let chats = Object.values(conversations).sort((a,b) => b.updatedAt - a.updatedAt);
        if (searchTerm) chats = chats.filter(c => c.title.toLowerCase().includes(searchTerm));
        const pinned = chats.filter(c => c.pinned);
        const recent = chats.filter(c => !c.pinned);
        let html = `<div class="px-8 py-4 text-[10px] font-bold uppercase tracking-[0.25em] text-white/15">Pinned</div>`;
        if (pinned.length === 0) html += `<div class="px-8 text-xs italic text-white/5 py-2">No pinned chats</div>`;
        else pinned.forEach(chat => { html += renderHistoryItem(chat); });
        html += `<div class="px-8 py-4 mt-6 text-[10px] font-bold uppercase tracking-[0.25em] text-white/15">Recent</div>`;
        if (recent.length === 0) html += `<div class="px-8 text-xs italic text-white/5 py-2">No recent chats</div>`;
        else recent.forEach(chat => { html += renderHistoryItem(chat); });
        container.innerHTML = html;
        attachHistoryEvents();
    }
    function renderHistoryItem(chat) {
        const activeClass = currentChatId === chat.id ? 'active' : '';
        return `<div class="history-item ${activeClass}" data-id="${chat.id}">
                    <span class="truncate">${escapeHtml(chat.title)}</span>
                    <button class="options-trigger" data-id="${chat.id}">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
                    </button>
                </div>`;
    }
    function attachHistoryEvents() {
        document.querySelectorAll('.history-item').forEach(el => {
            const id = el.dataset.id;
            if (id) {
                el.addEventListener('click', (e) => {
                    if (!e.target.closest('.options-trigger')) switchChat(id);
                });
            }
        });
        document.querySelectorAll('.options-trigger').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                const rect = btn.getBoundingClientRect();
                showChatDropdown(id, rect.left, rect.bottom);
            });
        });
    }

    // Dropdown for three dots – no modal, just a positioned menu
    function showChatDropdown(chatId, x, y) {
        // remove any existing dropdown
        const existing = document.querySelector('.dropdown-menu');
        if (existing) existing.remove();

        const menu = document.createElement('div');
        menu.className = 'dropdown-menu';
        menu.style.left = `${x - 140}px`;
        menu.style.top = `${y + 8}px`;
        menu.innerHTML = `

    function openRenameModal(chatId) {
        const modal = document.getElementById('renameModal');
        document.getElementById('renameInput').value = conversations[chatId].title;
        modal.style.display = 'flex';
        const confirm = document.getElementById('confirmRenameBtn');
        const cancel = document.getElementById('cancelRenameBtn');
        const finish = () => {
            const newName = document.getElementById('renameInput').value.trim();
            if (newName) {
                conversations[chatId].title = newName.slice(0, 40);
                saveToLocal();
                renderSidebar();
                if (currentChatId === chatId) updateTitleVisibility();
                showToast('Chat renamed');
            }
            modal.style.display = 'none';
        };
        confirm.onclick = finish;
        cancel.onclick = () => modal.style.display = 'none';
    }
    function openDeleteModal(chatId) {
        const modal = document.getElementById('deleteModal');
        modal.style.display = 'flex';
        const confirm = document.getElementById('confirmDeleteBtn');
        const cancel = document.getElementById('cancelDeleteBtn');
        const del = () => {
            delete conversations[chatId];
            if (currentChatId === chatId) {
                const remaining = Object.keys(conversations);
                if (remaining.length) currentChatId = remaining[0];
                else {
                    const newId = generateId();
                    conversations[newId] = { id: newId, title: 'New Chat', messages: [], pinned: false, updatedAt: Date.now() };
                    currentChatId = newId;
                }
            }
            saveToLocal();
            renderSidebar();
            renderMessages();
            updateTitleVisibility();
            showToast('Chat deleted');
            modal.style.display = 'none';
        };
        confirm.onclick = del;
        cancel.onclick = () => modal.style.display = 'none';
    }
    function togglePin(chatId) {
        if (conversations[chatId]) {
            conversations[chatId].pinned = !conversations[chatId].pinned;
            saveToLocal();
            renderSidebar();
            showToast(conversations[chatId].pinned ? 'Pinned' : 'Unpinned');
        }
    }
    function switchChat(chatId) {
        currentChatId = chatId;
        renderMessages();
        renderSidebar();
        updateTitleVisibility();
        setSolidBackground(conversations[currentChatId]?.messages.length > 0);
    }
    function updateTitleVisibility() {
        const title = document.getElementById('welcomeTitle');
        const chatContainer = document.getElementById('chatMessages');
        if (conversations[currentChatId]?.messages.length > 0) {
            title.classList.add('hidden-title');
            chatContainer.style.display = 'flex';
        } else {
            title.classList.remove('hidden-title');
            chatContainer.style.display = 'none';
        }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function formatMessage(text) {
        let parsed = escapeHtml(text);
        parsed = parsed.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => `<pre><code class="language-${lang||'plaintext'}">${code}</code></pre>`);
        parsed = parsed.replace(/`([^`]+)`/g, '<code style="background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:12px;">$1</code>');
        parsed = parsed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>');
        parsed = parsed.replace(/\n/g, '<br>');
        return parsed;
    }

    function openEditMessageModal(msgIndex, originalText) {
        const modal = document.getElementById('editMessageModal');
        const textarea = document.getElementById('editMessageText');
        textarea.value = originalText;
        pendingEditIndex = msgIndex;
        modal.style.display = 'flex';
        const confirmBtn = document.getElementById('confirmEditBtn');
        const cancelBtn = document.getElementById('cancelEditBtn');
        const finish = async () => {
            const newText = textarea.value.trim();
            if (!newText) return;
            const chat = conversations[currentChatId];
            chat.messages[pendingEditIndex].content = newText;
            chat.messages = chat.messages.slice(0, pendingEditIndex + 1);
            chat.updatedAt = Date.now();
            saveToLocal();
            renderMessages();
            await sendMessageAfterEdit();
            modal.style.display = 'none';
            showToast('Message updated');
        };
        confirmBtn.onclick = finish;
        cancelBtn.onclick = () => { modal.style.display = 'none'; };
    }

    async function sendMessageAfterEdit() {
        if (isLoading) return;
        const chat = conversations[currentChatId];
        const lastUserMsg = chat.messages[chat.messages.length-1];
        if (lastUserMsg.role !== 'user') return;
        isLoading = true;
        abortController = new AbortController();
        showTypingIndicator();
        const apiMessages = chat.messages.map(m => ({ role: m.role, content: m.content }));
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: apiMessages }),
                signal: abortController.signal
            });
            const data = await response.json();
            const reply = data.reply || "No response from AI.";
            removeTypingIndicator();
            chat.messages.push({ role: 'assistant', content: reply, timestamp: getTimestamp() });
            chat.updatedAt = Date.now();
            saveToLocal();
            renderMessages();
            renderSidebar();
        } catch(err) {
            removeTypingIndicator();
            if (err.name !== 'AbortError') {
                chat.messages.push({ role: 'assistant', content: `Error: ${err.message}`, timestamp: getTimestamp() });
                saveToLocal();
                renderMessages();
            }
        } finally {
            isLoading = false;
            abortController = null;
        }
    }

    async function regenerateAssistantMessage(msgIndex) {
        const chat = conversations[currentChatId];
        if (msgIndex < 0 || chat.messages[msgIndex].role !== 'assistant') return;
        chat.messages = chat.messages.slice(0, msgIndex);
        const lastUserMsg = chat.messages[chat.messages.length-1];
        if (!lastUserMsg || lastUserMsg.role !== 'user') return;
        isLoading = false;
        abortController = null;
        await sendMessageAfterEdit();
    }

    async function regenerateFromUserMessage(userIdx) {
        const chat = conversations[currentChatId];
        if (chat.messages[userIdx].role !== 'user') return;
        chat.messages = chat.messages.slice(0, userIdx + 1);
        saveToLocal();
        renderMessages();
        await sendMessageAfterEdit();
    }

    function showTypingIndicator() {
        const container = document.getElementById('chatMessages');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message assistant';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
        container.appendChild(typingDiv);
        container.scrollTop = container.scrollHeight;
    }
    function removeTypingIndicator() { const el = document.getElementById('typingIndicator'); if(el) el.remove(); }

    async function sendMessage() {
        if (isLoading) return;
        const textarea = document.getElementById('messageInput');
        const text = textarea.value.trim();
        if (!text) return;
        textarea.value = '';
        textarea.style.height = 'auto';
        document.getElementById('sendBtn').classList.remove('active');
        const chat = conversations[currentChatId];
        chat.messages.push({ role: 'user', content: text, timestamp: getTimestamp() });
        chat.updatedAt = Date.now();
        if (chat.title === 'New Chat') chat.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
        saveToLocal();
        renderMessages();
        renderSidebar();
        updateTitleVisibility();
        isLoading = true;
        abortController = new AbortController();
        showTypingIndicator();
        const apiMessages = chat.messages.map(m => ({ role: m.role, content: m.content }));
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: apiMessages }),
                signal: abortController.signal
            });
            const data = await response.json();
            const reply = data.reply || "No response from AI.";
            removeTypingIndicator();
            chat.messages.push({ role: 'assistant', content: reply, timestamp: getTimestamp() });
            chat.updatedAt = Date.now();
            saveToLocal();
            renderMessages();
            renderSidebar();
        } catch(err) {
            removeTypingIndicator();
            if (err.name !== 'AbortError') {
                chat.messages.push({ role: 'assistant', content: `Error: ${err.message}`, timestamp: getTimestamp() });
                saveToLocal();
                renderMessages();
            }
        } finally {
            isLoading = false;
            abortController = null;
        }
    }

    function newChat() {
        const newId = generateId();
        conversations[newId] = { id: newId, title: 'New Chat', messages: [], pinned: false, updatedAt: Date.now() };
        currentChatId = newId;
        saveToLocal();
        renderMessages();
        renderSidebar();
        updateTitleVisibility();
        document.getElementById('messageInput').value = '';
        document.getElementById('sendBtn').classList.remove('active');
        setSolidBackground(false);
        showToast('New conversation created');
    }

    function startVoice() {
        if (!('webkitSpeechRecognition' in window)) {
            showToast('Voice input not supported in this browser');
            return;
        }
        const recognition = new webkitSpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.onresult = (e) => {
            document.getElementById('messageInput').value = e.results[0][0].transcript;
            const event = new Event('input');
            document.getElementById('messageInput').dispatchEvent(event);
        };
        recognition.onerror = () => showToast('Voice recognition failed');
        recognition.start();
    }

    // Event listeners
    document.getElementById('newChatBtn').addEventListener('click', newChat);
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('micBtn').addEventListener('click', startVoice);
    document.getElementById('plusBtn').addEventListener('click', () => showToast('File upload coming soon'));
    document.getElementById('messageInput').addEventListener('input', function() {
        const btn = document.getElementById('sendBtn');
        if (this.value.trim().length > 0) btn.classList.add('active');
        else btn.classList.remove('active');
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 280) + 'px';
    });
    document.getElementById('messageInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    document.getElementById('searchInput').addEventListener('input', () => renderSidebar());

    loadData();
    renderSidebar();
    renderMessages();
    updateTitleVisibility();
</script>
</body>
</html>
