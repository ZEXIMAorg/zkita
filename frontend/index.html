<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Zkita AI · by xkitz7</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/css/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- MingCute Icon Font (no SVGs needed, but uses icon font) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mingcute_icon@1.0.0/css/mingcute.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #faf0ff;
      --surface: rgba(255, 245, 255, 0.68);
      --surface-solid: #fff0fe;
      --sidebar-bg: #fff5fe;
      --text: #1a0b1e;
      --text-secondary: #6b4e7e;
      --accent: #c084fc;
      --accent-hover: #a855f7;
      --border: rgba(0, 0, 0, 0.06);
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.04);
      --user-msg-bg: #e9d5ff;
      --assistant-msg-bg: #ffffffcc;
      --code-bg: #f3e8ff;
      --scrollbar: #d9c7f0;
    }

    body.dark {
      --bg: #0a0a0f;
      --surface: rgba(18, 18, 28, 0.75);
      --surface-solid: #12121c;
      --sidebar-bg: #0f0f18;
      --text: #f0e6ff;
      --text-secondary: #a78bc7;
      --accent: #d780ff;
      --accent-hover: #e09eff;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
      --user-msg-bg: #2e1a47;
      --assistant-msg-bg: #1e102ccc;
      --code-bg: #1e1730;
      --scrollbar: #3c2a4a;
    }

    body {
      background: var(--bg);
      font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;
      color: var(--text);
      height: 100vh;
      display: flex;
      transition: background 0.2s;
      overflow: hidden;
    }

    /* ========= SIDEBAR ========= */
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 12px;
      flex-shrink: 0;
    }

    .search-wrapper {
      position: relative;
      margin-bottom: 24px;
    }
    .search-wrapper i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 1rem;
    }
    #searchHistoryInput {
      width: 100%;
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 10px 12px 10px 36px;
      font-size: 0.8rem;
      color: var(--text);
      outline: none;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin: 16px 8px 8px 8px;
    }
    .section-header h4 {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }
    .new-chat-icon {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 1rem;
      transition: 0.1s;
      padding: 2px;
      border-radius: 20px;
    }
    .new-chat-icon:hover {
      background: var(--accent);
      color: #1a0b1e;
    }

    .history-section {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .history-group {
      margin-bottom: 8px;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 28px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: 0.1s;
      color: var(--text);
      position: relative;
    }
    .history-item:hover {
      background: var(--accent);
      color: #1a0b1e;
    }
    .history-item.active {
      background: var(--accent);
      color: #1a0b1e;
      font-weight: 500;
    }
    .chat-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-more {
      font-size: 1rem;
      cursor: pointer;
      padding: 0 6px;
      opacity: 0.6;
      border-radius: 20px;
    }
    .chat-more:hover { opacity: 1; background: rgba(0,0,0,0.1); }

    /* dropdown menu for chat options */
    .dropdown-menu {
      position: fixed;
      background: var(--surface-solid);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 6px 0;
      z-index: 1200;
      min-width: 140px;
    }
    .dropdown-menu div {
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text);
    }
    .dropdown-menu div:hover {
      background: var(--accent);
      color: #1a0b1e;
    }

    /* user profile footer */
    .user-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .avatar {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar i { font-size: 1.2rem; color: #1a0b1e; }
    .username { font-size: 0.8rem; font-weight: 500; }
    .footer-actions {
      display: flex;
      gap: 12px;
    }
    .footer-actions button {
      background: transparent;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 4px;
      border-radius: 50%;
    }
    .footer-actions button:hover {
      background: var(--accent);
      color: #1a0b1e;
    }

    /* ========= MAIN CHAT ========= */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      backdrop-filter: blur(20px);
      margin: 12px 12px 12px 0;
      border-radius: 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    /* header integrated (no border line) */
    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: transparent;
    }
    .chat-name {
      font-size: 1rem;
      font-weight: 500;
      background: var(--accent);
      padding: 4px 16px;
      border-radius: 40px;
      color: #1a0b1e;
    }
    .logo-badge {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-badge h2 {
      font-size: 1.2rem;
      background: linear-gradient(135deg, var(--accent), #b77dff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeIn 0.2s;
    }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }
    .bubble {
      padding: 10px 16px;
      border-radius: 22px;
      line-height: 1.5;
      font-size: 0.9rem;
      background: var(--assistant-msg-bg);
      border: 1px solid var(--border);
      word-break: break-word;
    }
    .user .bubble { background: var(--user-msg-bg); border-bottom-right-radius: 6px; }
    .assistant .bubble { border-bottom-left-radius: 6px; }

    .message-meta {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      font-size: 0.65rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .message-buttons {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .msg-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.65rem;
      cursor: pointer;
      color: var(--text-secondary);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* input area */
    .input-area {
      padding: 12px 20px 20px;
      background: var(--surface-solid);
      border-top: 1px solid var(--border);
    }
    .input-wrapper {
      display: flex;
      gap: 8px;
      background: var(--bg);
      border-radius: 40px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      background: transparent;
      border: none;
      padding: 10px 4px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      outline: none;
      color: var(--text);
      max-height: 120px;
    }
    .input-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .char-counter { font-size: 0.7rem; color: var(--text-secondary); }
    .send-btn, .stop-btn {
      background: var(--accent);
      border: none;
      border-radius: 40px;
      padding: 8px 16px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .stop-btn { background: #ff4444; color: white; }

    /* Canvas panel */
    .canvas-panel {
      position: fixed;
      top: 0;
      right: -100%;
      width: 70%;
      max-width: 800px;
      height: 100vh;
      background: var(--surface-solid);
      backdrop-filter: blur(32px);
      border-left: 1px solid var(--border);
      box-shadow: -8px 0 24px rgba(0,0,0,0.2);
      z-index: 1500;
      display: flex;
      flex-direction: column;
      transition: right 0.3s ease;
    }
    .canvas-panel.open { right: 0; }
    .canvas-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .canvas-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .code-area {
      flex: 1;
      background: #0f0f0f;
      color: #f8e8ff;
      padding: 16px;
      overflow: auto;
      font-family: monospace;
      white-space: pre-wrap;
    }
    .preview-area {
      flex: 1;
      background: white;
    }
    .preview-area iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .canvas-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    /* modal settings */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: var(--surface-solid);
      border-radius: 28px;
      width: 90%;
      max-width: 420px;
      padding: 24px;
    }
    @media (max-width: 720px) {
      .sidebar { width: 260px; }
      .canvas-panel { width: 100%; border-radius: 20px 0 0 20px; }
      .message { max-width: 95%; }
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px);} to { opacity:1; transform:translateY(0);} }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 8px; }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="search-wrapper">
    <i class="mgc_search_line"></i>
    <input type="text" id="searchHistoryInput" placeholder="Find a conversation">
  </div>

  <div class="section-header">
    <h4>TODAY</h4>
    <button class="new-chat-icon" id="newChatBtn"><i class="mgc_add_line"></i></button>
  </div>
  <div id="todayList" class="history-list"></div>

  <div class="section-header">
    <h4>YESTERDAY</h4>
  </div>
  <div id="yesterdayList" class="history-list"></div>

  <div class="section-header">
    <h4>PREVIOUS</h4>
  </div>
  <div id="previousList" class="history-list"></div>

  <div class="user-footer">
    <div class="user-info">
      <div class="avatar"><i class="mgc_user_3_line"></i></div>
      <span class="username">xkitz7</span>
    </div>
    <div class="footer-actions">
      <button id="voiceFooterBtn" title="Voice input"><i class="mgc_mic_line"></i></button>
      <button id="exportFooterBtn" title="Export all chats"><i class="mgc_download_line"></i></button>
      <button id="settingsFooterBtn" title="Settings"><i class="mgc_settings_line"></i></button>
    </div>
  </div>
</div>

<div class="main">
  <div class="chat-header">
    <div class="chat-name" id="currentChatName">New Chat</div>
    <div class="logo-badge"><h2>Zkita AI</h2></div>
  </div>
  <div class="chat-container" id="chatContainer"></div>
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="messageInput" placeholder="Ask me anything..." rows="1"></textarea>
      <div class="input-actions">
        <span class="char-counter" id="charCounter">0</span>
        <button class="send-btn" id="sendBtn"><i class="mgc_send_line"></i> Send</button>
        <button class="stop-btn" id="stopBtn" style="display:none;"><i class="mgc_close_line"></i> Stop</button>
      </div>
    </div>
  </div>
</div>

<!-- Canvas panel for code testing -->
<div id="codeCanvas" class="canvas-panel">
  <div class="canvas-header">
    <h3><i class="mgc_code_line"></i> Code Canvas</h3>
    <button class="close-canvas"><i class="mgc_close_line"></i></button>
  </div>
  <div class="canvas-body">
    <div class="code-area" id="canvasCodePanel"></div>
    <div class="preview-area"><iframe id="canvasPreview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe></div>
  </div>
  <div class="canvas-footer">
    <button id="copyCanvasCodeBtn"><i class="mgc_copy_line"></i> Copy</button>
    <button id="runCanvasBtn"><i class="mgc_play_line"></i> Run</button>
  </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal">
  <div class="modal-content">
    <h3>Settings</h3>
    <label>Dark Mode</label>
    <select id="themeSelect" style="width:100%; margin:8px 0 16px; padding:8px; border-radius:24px;">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
    </select>
    <label>Custom System Prompt</label>
    <textarea id="customSystemPrompt" rows="3" style="width:100%; border-radius:20px; padding:8px; background:var(--bg); color:var(--text); border:1px solid var(--border);"></textarea>
    <button id="saveSettingsBtn" style="margin-top:16px; background:var(--accent); border:none; padding:8px 20px; border-radius:40px;">Save</button>
    <button id="closeModalBtn" style="margin-top:8px; background:none; border:none; float:right;">Close</button>
  </div>
</div>

<script>
  // ---------- DATA ----------
  let conversations = {};
  let currentChatId = null;
  let isLoading = false;
  let abortController = null;
  let userSystemPrompt = "";
  let autoScroll = true;

  const STORAGE_KEY = 'zkita_final_v3';

  function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }

  function loadData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if(stored) {
      try {
        const data = JSON.parse(stored);
        conversations = data.conversations || {};
        userSystemPrompt = data.userSystemPrompt || "";
        if(Object.keys(conversations).length === 0) createDefaultChat();
      } catch(e) { createDefaultChat(); }
    } else { createDefaultChat(); }
    if(!conversations[currentChatId]) currentChatId = Object.keys(conversations)[0];
    saveToLocal();
  }

  function createDefaultChat() {
    const id = generateId();
    conversations = { [id]: { id, title: 'New Chat', messages: [], createdAt: Date.now(), updatedAt: Date.now(), pinned: false } };
    currentChatId = id;
  }

  function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ conversations, userSystemPrompt })); }

  function getDateCategory(timestamp) {
    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
    const yesterdayStart = todayStart - 86400000;
    if(timestamp >= todayStart) return 'today';
    if(timestamp >= yesterdayStart) return 'yesterday';
    return 'previous';
  }

  function renderSidebar() {
    const searchTerm = document.getElementById('searchHistoryInput').value.toLowerCase();
    let chatsArray = Object.values(conversations).sort((a,b)=>b.updatedAt - a.updatedAt);
    if(searchTerm) chatsArray = chatsArray.filter(c => c.title.toLowerCase().includes(searchTerm));

    const today = [], yesterday = [], previous = [];
    for(let chat of chatsArray) {
      const cat = getDateCategory(chat.updatedAt);
      if(cat === 'today') today.push(chat);
      else if(cat === 'yesterday') yesterday.push(chat);
      else previous.push(chat);
    }
    function renderChatList(chats, containerId) {
      const container = document.getElementById(containerId);
      if(!container) return;
      if(chats.length === 0) { container.innerHTML = '<div style="padding:8px 12px; opacity:0.5; font-size:0.7rem;">No chats</div>'; return; }
      let html = '';
      for(let chat of chats) {
        const active = currentChatId === chat.id ? 'active' : '';
        html += `<div class="history-item ${active}" data-id="${chat.id}">
          <span class="chat-title">${escapeHtml(chat.title)}</span>
          <i class="mgc_more_2_line chat-more" data-id="${chat.id}"></i>
        </div>`;
      }
      container.innerHTML = html;
    }
    renderChatList(today, 'todayList');
    renderChatList(yesterday, 'yesterdayList');
    renderChatList(previous, 'previousList');

    // attach click events for chat selection and more menu
    document.querySelectorAll('.history-item').forEach(el => {
      const chatId = el.dataset.id;
      el.addEventListener('click', (e) => {
        if(e.target.classList.contains('chat-more')) return;
        if(chatId) switchChat(chatId);
      });
    });
    document.querySelectorAll('.chat-more').forEach(icon => {
      icon.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = icon.dataset.id;
        const rect = icon.getBoundingClientRect();
        showChatMenu(id, rect.left, rect.bottom);
      });
    });
  }

  function showChatMenu(chatId, x, y) {
    const existing = document.querySelector('.dropdown-menu');
    if(existing) existing.remove();
    const menu = document.createElement('div');
    menu.className = 'dropdown-menu';
    menu.style.left = `${x - 120}px`;
    menu.style.top = `${y + 4}px`;
    menu.innerHTML = `
      <div data-action="rename"><i class="mgc_edit_line"></i> Rename</div>
      <div data-action="pin"><i class="mgc_pushpin_line"></i> ${conversations[chatId]?.pinned ? 'Unpin' : 'Pin'}</div>
      <div data-action="delete"><i class="mgc_delete_line"></i> Delete</div>
    `;
    document.body.appendChild(menu);
    const handleClick = (e) => {
      const action = e.target.closest('[data-action]')?.dataset.action;
      if(action === 'rename') renameChat(chatId);
      if(action === 'pin') togglePin(chatId);
      if(action === 'delete') deleteChat(chatId);
      menu.remove();
      document.removeEventListener('click', handleClick);
    };
    setTimeout(() => document.addEventListener('click', handleClick), 10);
  }

  function renameChat(chatId) {
    const newName = prompt('Enter new chat name:', conversations[chatId]?.title);
    if(newName && newName.trim()) {
      conversations[chatId].title = newName.trim().substring(0, 40);
      saveToLocal();
      renderSidebar();
      if(currentChatId === chatId) document.getElementById('currentChatName').innerText = conversations[chatId].title;
    }
  }
  function togglePin(chatId) {
    if(conversations[chatId]) {
      conversations[chatId].pinned = !conversations[chatId].pinned;
      saveToLocal();
      renderSidebar();
    }
  }
  function deleteChat(chatId) {
    if(confirm('Delete this conversation?')) {
      delete conversations[chatId];
      if(currentChatId === chatId) {
        const remaining = Object.keys(conversations);
        if(remaining.length) currentChatId = remaining[0];
        else createDefaultChat();
      }
      saveToLocal();
      renderSidebar();
      if(currentChatId) renderMessages();
    }
  }

  function switchChat(id) {
    currentChatId = id;
    document.getElementById('currentChatName').innerText = conversations[id].title;
    renderMessages();
    renderSidebar();
  }

  // helpers
  function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
  function formatMessage(text) {
    let parsed = escapeHtml(text);
    parsed = parsed.replace(/```(\w*)\n([\s\S]*?)```/g, (m,lang,code) => `<pre><code class="language-${lang||'plaintext'}">${code}</code></pre>`);
    parsed = parsed.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
    parsed = parsed.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
    parsed = parsed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    parsed = parsed.replace(/\*(.*?)\*/g, '<em>$1</em>');
    parsed = parsed.replace(/\|\|(.*?)\|\|/g, '<span class="spoiler" style="background:#1a1a2e; color:#1a1a2e; cursor:pointer; border-radius:8px;" onclick="this.classList.add(\'revealed\')">$1</span>');
    parsed = parsed.replace(/\n/g, '<br>');
    return parsed;
  }
  function getTimestamp() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }

  function renderMessages() {
    const container = document.getElementById('chatContainer');
    if(!container || !currentChatId || !conversations[currentChatId]) return;
    const msgs = conversations[currentChatId].messages;
    container.innerHTML = '';
    for(let msg of msgs) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${msg.role}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = formatMessage(msg.content);
      msgDiv.appendChild(bubble);
      const meta = document.createElement('div');
      meta.className = 'message-meta';
      meta.innerHTML = `<span>${msg.timestamp || getTimestamp()}</span><i class="mgc_pushpin_line pin-msg" style="cursor:pointer; opacity:${msg.pinned?1:0.5}"></i>`;
      const pinIcon = meta.querySelector('.pin-msg');
      pinIcon.onclick = () => { msg.pinned = !msg.pinned; saveToLocal(); renderMessages(); };
      msgDiv.appendChild(meta);
      const btns = document.createElement('div');
      btns.className = 'message-buttons';
      btns.innerHTML = `<button class="msg-btn" data-copy><i class="mgc_copy_line"></i> Copy</button>
                        <button class="msg-btn" data-download><i class="mgc_download_line"></i> Download</button>`;
      if(msg.role === 'assistant') {
        const hasCode = (msg.content.match(/```/g) || []).length >= 2;
        if(hasCode) btns.innerHTML += `<button class="msg-btn" data-test><i class="mgc_code_line"></i> Test</button>`;
      }
      msgDiv.appendChild(btns);
      container.appendChild(msgDiv);
    }
    // attach button events
    document.querySelectorAll('.msg-btn[data-copy]').forEach(btn => btn.onclick = () => { const text = btn.closest('.message').querySelector('.bubble').innerText; navigator.clipboard.writeText(text); showToast('Copied'); });
    document.querySelectorAll('.msg-btn[data-download]').forEach(btn => btn.onclick = () => { const text = btn.closest('.message').querySelector('.bubble').innerText; const blob = new Blob([text], {type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='ZKITA.txt'; a.click(); URL.revokeObjectURL(blob); });
    document.querySelectorAll('.msg-btn[data-test]').forEach(btn => btn.onclick = () => { const text = btn.closest('.message').querySelector('.bubble').innerText; extractAndOpenCanvas(text); });
    document.querySelectorAll('.bubble pre code').forEach(block => hljs.highlightElement(block));
    if(autoScroll) container.scrollTop = container.scrollHeight;
  }

  // Canvas (Gemini-like)
  let currentCanvasCode = "";
  function extractAndOpenCanvas(text) {
    const match = text.match(/```(\w*)\n([\s\S]*?)```/);
    if(match) currentCanvasCode = match[2];
    else currentCanvasCode = text;
    document.getElementById('canvasCodePanel').innerHTML = `<pre style="margin:0;">${escapeHtml(currentCanvasCode)}</pre>`;
    document.getElementById('canvasPreview').srcdoc = currentCanvasCode;
    document.getElementById('codeCanvas').classList.add('open');
  }
  document.querySelectorAll('.close-canvas').forEach(btn => btn.onclick = () => document.getElementById('codeCanvas').classList.remove('open'));
  document.getElementById('runCanvasBtn').onclick = () => document.getElementById('canvasPreview').srcdoc = currentCanvasCode;
  document.getElementById('copyCanvasCodeBtn').onclick = () => { navigator.clipboard.writeText(currentCanvasCode); showToast('Code copied'); };

  // API call
  async function sendMessage() {
    if(isLoading) { showToast("Already generating..."); return; }
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if(!text) return;
    input.value = '';
    document.getElementById('charCounter').innerText = '0';
    const chat = conversations[currentChatId];
    chat.messages.push({ role: 'user', content: text, timestamp: getTimestamp(), pinned: false });
    chat.updatedAt = Date.now();
    if(chat.title === 'New Chat') chat.title = text.slice(0,30)+(text.length>30?'...':'');
    saveToLocal();
    renderMessages();
    renderSidebar();
    document.getElementById('currentChatName').innerText = chat.title;

    isLoading = true;
    document.getElementById('sendBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'inline-flex';
    abortController = new AbortController();
    const apiMessages = chat.messages.map(m => ({ role: m.role, content: m.content }));
    if(userSystemPrompt) apiMessages.unshift({ role: 'system', content: userSystemPrompt });
    try {
      const res = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ messages: apiMessages }), signal: abortController.signal });
      const data = await res.json();
      const reply = data.reply || "No response.";
      chat.messages.push({ role: 'assistant', content: reply, timestamp: getTimestamp(), pinned: false });
      chat.updatedAt = Date.now();
      saveToLocal();
      renderMessages();
      renderSidebar();
    } catch(err) {
      if(err.name !== 'AbortError') {
        chat.messages.push({ role: 'assistant', content: `Error: ${err.message}`, timestamp: getTimestamp() });
        saveToLocal();
        renderMessages();
      }
    } finally {
      isLoading = false;
      document.getElementById('sendBtn').style.display = 'inline-flex';
      document.getElementById('stopBtn').style.display = 'none';
      abortController = null;
      input.disabled = false;
      input.focus();
    }
  }
  function stopGeneration() { if(abortController) abortController.abort(); }
  function newChat() { const id = generateId(); conversations[id] = { id, title: 'New Chat', messages: [], createdAt: Date.now(), updatedAt: Date.now(), pinned: false }; saveToLocal(); switchChat(id); renderSidebar(); }
  function exportAllChats() { const data = JSON.stringify(conversations, null,2); const blob = new Blob([data], {type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`zkita_backup_${Date.now()}.json`; a.click(); URL.revokeObjectURL(blob); }
  function startVoice() { if(!('webkitSpeechRecognition' in window)) return alert('Voice not supported'); const rec = new webkitSpeechRecognition(); rec.lang='en-US'; rec.onresult=e=>{ document.getElementById('messageInput').value = e.results[0][0].transcript; document.getElementById('charCounter').innerText = e.results[0][0].transcript.length; }; rec.start(); }

  // Settings
  const modal = document.getElementById('settingsModal');
  document.getElementById('settingsFooterBtn').onclick = () => modal.style.display='flex';
  document.getElementById('closeModalBtn').onclick = () => modal.style.display='none';
  document.getElementById('saveSettingsBtn').onclick = () => {
    userSystemPrompt = document.getElementById('customSystemPrompt').value;
    const theme = document.getElementById('themeSelect').value;
    if(theme === 'dark') document.body.classList.add('dark');
    else document.body.classList.remove('dark');
    localStorage.setItem('zkita_theme', theme);
    saveToLocal();
    modal.style.display='none';
    showToast('Settings saved');
  };
  function initTheme() { const saved = localStorage.getItem('zkita_theme'); if(saved === 'dark') document.body.classList.add('dark'); else document.body.classList.remove('dark'); }
  function showToast(msg) { const t=document.createElement('div'); t.innerText=msg; t.style.position='fixed'; t.style.bottom='20px'; t.style.left='50%'; t.style.transform='translateX(-50%)'; t.style.background='var(--accent)'; t.style.padding='8px 20px'; t.style.borderRadius='40px'; t.style.zIndex='3000'; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }

  // Bind events
  document.getElementById('sendBtn').onclick = sendMessage;
  document.getElementById('stopBtn').onclick = stopGeneration;
  document.getElementById('newChatBtn').onclick = newChat;
  document.getElementById('exportFooterBtn').onclick = exportAllChats;
  document.getElementById('voiceFooterBtn').onclick = startVoice;
  document.getElementById('messageInput').addEventListener('input', function(e) { document.getElementById('charCounter').innerText = this.value.length; });
  document.getElementById('messageInput').addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  document.getElementById('searchHistoryInput').addEventListener('input', () => renderSidebar());

  loadData();
  initTheme();
  renderMessages();
  renderSidebar();
  if(currentChatId) document.getElementById('currentChatName').innerText = conversations[currentChatId].title;
</script>
</body>
</html>
