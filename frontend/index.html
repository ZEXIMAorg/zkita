<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZKita AI Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #0F0D11;
            color: #F9EBFF;
            overflow: hidden;
            height: 100vh;
        }

        ::selection {
            background-color: #EFC0FF;
            color: #100D11;
        }

        *:focus {
            outline: none !important;
        }

        .layout-wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Frosted Glass Sidebar */
        #sidebar {
            width: 300px;
            background-color: rgba(15, 13, 17, 0.7);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border-right: 1px solid rgba(249, 235, 255, 0.04);
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 50;
            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 40px;
            position: relative;
            background-color: #0F0D11;
            overflow: hidden;
        }

        /* Chat messages container (added) */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            width: 100%;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 20px 10px 10px 10px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeInUp 0.3s ease;
        }
        .message.user {
            align-self: flex-end;
        }
        .message.assistant {
            align-self: flex-start;
        }
        .bubble {
            padding: 12px 18px;
            border-radius: 26px;
            font-size: 0.95rem;
            line-height: 1.5;
            background: rgba(249, 235, 255, 0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(249, 235, 255, 0.1);
        }
        .user .bubble {
            background: linear-gradient(135deg, #6D28D9, #EFC0FF);
            color: #0F0D11;
            border-bottom-right-radius: 6px;
        }
        .assistant .bubble {
            border-bottom-left-radius: 6px;
        }
        .message-meta {
            font-size: 0.65rem;
            color: rgba(249, 235, 255, 0.4);
            margin-top: 4px;
            margin-left: 12px;
        }
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(249, 235, 255, 0.05);
            border-radius: 40px;
            width: fit-content;
            border: 1px solid rgba(249, 235, 255, 0.1);
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #EFC0FF;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Aurora & other existing styles unchanged */
        .aurora-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            filter: blur(120px);
            opacity: 0.15;
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            animation: move 25s infinite alternate ease-in-out;
        }
        .blob-1 { background: #EFC0FF; top: -10%; left: -10%; }
        .blob-2 { background: #6D28D9; bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(150px, 100px) scale(1.3); }
        }

        .sidebar-header {
            display: flex;
            flex-direction: column;
            padding: 24px 20px 10px 20px;
            gap: 16px;
        }
        .new-chat-btn {
            background-color: #F9EBFF;
            color: #100D11;
            font-weight: 600;
            font-size: 15px;
            width: 100%;
            height: 54px;
            border-radius: 27px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border: none;
            cursor: pointer;
        }
        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(249, 235, 255, 0.15);
            filter: brightness(1.08);
        }
        .sidebar-search-wrapper {
            position: relative;
            width: 100%;
        }
        .sidebar-search {
            width: 100%;
            height: 40px;
            background-color: rgba(249, 235, 255, 0.05);
            border: 1px solid rgba(249, 235, 255, 0.6);
            border-radius: 20px;
            padding: 0 16px 0 38px;
            font-size: 14px;
            color: #F9EBFF;
            outline: none;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(249, 235, 255, 0.1);
        }
        .sidebar-search:focus {
            background-color: rgba(249, 235, 255, 0.08);
            border-color: rgba(249, 235, 255, 1);
            box-shadow: 0 0 15px rgba(249, 235, 255, 0.25);
        }
        .sidebar-search::placeholder {
            color: rgba(249, 235, 255, 0.3);
        }
        .search-icon-sidebar {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(249, 235, 255, 0.8);
            pointer-events: none;
        }

        .search-container {
            position: relative;
            z-index: 10;
            background-color: rgba(22, 18, 24, 0.6);
            backdrop-filter: blur(60px);
            border: 1px solid rgba(249, 235, 255, 0.08);
            width: 100%;
            max-width: 780px;
            border-radius: 34px;
            padding: 26px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
        }
        .search-container::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, #6D28D9 0%, #EFC0FF 30%, transparent 70%);
            opacity: 0.04;
            filter: blur(80px);
            z-index: -1;
            animation: rotateShift 15s linear infinite;
            pointer-events: none;
        }
        @keyframes rotateShift {
            from { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            to { transform: rotate(360deg) scale(1); }
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            color: #F9EBFF;
            font-size: 18px;
            line-height: 1.6;
            max-height: 280px;
            scrollbar-width: none;
        }

        .history-item {
            padding: 12px 18px;
            margin: 2px 12px;
            border-radius: 14px;
            font-size: 14.5px;
            color: rgba(249, 235, 255, 0.45);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
        }
        .history-item:hover {
            background-color: rgba(249, 235, 255, 0.05);
            color: #F9EBFF;
            padding-left: 22px;
        }
        .options-trigger {
            opacity: 0;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            color: rgba(249, 235, 255, 0.4);
            margin-left: 8px;
            flex-shrink: 0;
            border: none;
            background: transparent;
            cursor: pointer;
        }
        .history-item:hover .options-trigger { opacity: 1; }

        .action-menu {
            position: absolute;
            right: 0;
            top: 40px;
            background: rgba(24, 20, 26, 0.95);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(249, 235, 255, 0.1);
            border-radius: 20px;
            width: 220px;
            z-index: 1000;
            display: none;
            padding: 8px;
            animation: menuPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .action-menu.show { display: block; }
        @keyframes menuPop {
            from { opacity: 0; transform: scale(0.85) translateY(-15px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .action-item {
            padding: 10px 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: rgba(249, 235, 255, 0.7);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .action-item:hover {
            background-color: rgba(249, 235, 255, 0.08);
            color: #F9EBFF;
        }
        .action-item.delete:hover {
            background-color: rgba(248, 113, 113, 0.15);
            color: #f87171;
        }

        #sendBtn {
            cursor: default;
            color: rgba(249, 235, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: transparent;
            border: none;
        }
        #sendBtn.active {
            color: #100D11;
            background-color: #F9EBFF;
            cursor: pointer;
            border-radius: 14px;
            transform: scale(1.1);
        }
        .plus-button, .mic-button {
            background-color: rgba(249, 235, 255, 0.04);
            border: 1px solid rgba(249, 235, 255, 0.08);
            color: rgba(249, 235, 255, 0.6);
            transition: all 0.4s;
            cursor: pointer;
        }
        .plus-button:hover, .mic-button:hover {
            background-color: rgba(249, 235, 255, 0.1);
            transform: translateY(-2px) scale(1.05);
            color: #F9EBFF;
            border-color: rgba(249, 235, 255, 0.2);
        }
        .plus-button:hover { transform: rotate(45deg) scale(1.1); }
        h1 {
            transition: all 0.4s;
        }
        #historyContainer::-webkit-scrollbar { width: 4px; }
        #historyContainer::-webkit-scrollbar-thumb { background: rgba(249, 235, 255, 0.05); border-radius: 10px; }
        .disclaimer {
            font-size: 11px;
            color: rgba(249, 235, 255, 0.2);
            text-align: center;
            margin-top: 18px;
        }
        .hidden-title {
            display: none;
        }
    </style>
</head>
<body>

<div class="layout-wrapper">
    <aside id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Chat
            </button>
            <div class="sidebar-search-wrapper">
                <svg class="search-icon-sidebar" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" class="sidebar-search" placeholder="Search chats...">
            </div>
        </div>
        <div id="historyContainer" class="flex-1 overflow-y-auto pb-8">
            <!-- dynamically filled -->
        </div>
    </aside>

    <main class="main-content">
        <div class="aurora-bg">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>

        <div class="w-full flex flex-col items-center relative z-10 h-full justify-center">
            <h1 id="welcomeTitle" class="text-5xl font-medium mb-16 tracking-tight text-[#F9EBFF] text-center opacity-90">
                Hi there. Where should we dive today?
            </h1>

            <!-- Chat messages container -->
            <div id="chatMessages" class="chat-messages" style="display: none;"></div>

            <div class="search-container">
                <textarea id="messageInput" placeholder="Ask ZKita AI anything..." rows="1"></textarea>
                <div class="flex items-center justify-between mt-12">
                    <div class="flex items-center gap-3">
                        <button id="plusBtn" class="plus-button w-12 h-12 rounded-full flex items-center justify-center">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                        <button id="micBtn" class="mic-button w-12 h-12 rounded-full flex items-center justify-center">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                        </button>
                    </div>
                    <button id="sendBtn" class="w-12 h-12 flex items-center justify-center transition-all">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2 12L22 2L15 22L11 13L2 12Z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </div>

            <p class="disclaimer">
                ZKita AI can make mistakes and will not have any liability for misuse, misinformation, or real-world use.
            </p>
        </div>
    </main>
</div>

<script>
    // ---------- STORAGE & STATE ----------
    let conversations = {};
    let currentChatId = null;
    let isLoading = false;
    let abortController = null;
    const STORAGE_KEY = 'zkita_neon_chats';

    // Helper functions
    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }
    function getTimestamp() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }

    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                conversations = JSON.parse(stored);
            } catch(e) { conversations = {}; }
        }
        if (Object.keys(conversations).length === 0) {
            const newId = generateId();
            conversations[newId] = { id: newId, title: 'New Chat', messages: [], pinned: false, updatedAt: Date.now() };
            currentChatId = newId;
        } else {
            currentChatId = Object.keys(conversations)[0];
        }
        saveToLocal();
    }
    function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations)); }

    // Render sidebar (Pinned, Recent, search)
    function renderSidebar() {
        const container = document.getElementById('historyContainer');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        let chats = Object.values(conversations).sort((a,b) => b.updatedAt - a.updatedAt);
        if (searchTerm) chats = chats.filter(c => c.title.toLowerCase().includes(searchTerm));

        const pinned = chats.filter(c => c.pinned);
        const recent = chats.filter(c => !c.pinned);

        let html = `<div class="px-8 py-4 text-[10px] font-bold uppercase tracking-[0.25em] text-white/15">Pinned</div>`;
        if (pinned.length === 0) html += `<div class="px-8 text-xs italic text-white/5 py-2">No pinned chats</div>`;
        else pinned.forEach(chat => { html += renderHistoryItem(chat); });

        html += `<div class="px-8 py-4 mt-6 text-[10px] font-bold uppercase tracking-[0.25em] text-white/15">Recent</div>`;
        if (recent.length === 0) html += `<div class="px-8 text-xs italic text-white/5 py-2">No recent chats</div>`;
        else recent.forEach(chat => { html += renderHistoryItem(chat); });

        container.innerHTML = html;
        attachHistoryEvents();
    }

    function renderHistoryItem(chat) {
        const activeClass = currentChatId === chat.id ? 'active' : '';
        return `<div class="history-item ${activeClass}" data-id="${chat.id}">
                    <span class="truncate">${escapeHtml(chat.title)}</span>
                    <button class="options-trigger" data-id="${chat.id}">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
                    </button>
                    <div class="action-menu" data-menu="${chat.id}">
                        <div class="px-4 py-2 text-[10px] font-bold text-white/20 uppercase tracking-widest">Chat Options</div>
                        <div class="h-[1px] bg-white/5 my-1 mx-2"></div>
                        <div class="action-item" data-action="pin" data-id="${chat.id}">
                            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M12.8683 0.586248C12.5278 0.245586 12.0759 0.0392126 11.5955 0.00504274C11.1151 -0.0291271 10.6385 0.111202 10.2533 0.400248L7.34029 2.58525C6.13019 3.49303 4.7108 4.08115 3.21329 4.29525L1.03629 4.60525C0.306288 4.71025 -0.228712 5.49625 0.123288 6.26725C0.454288 6.99025 1.50829 8.89625 4.48329 11.9872L0.305288 16.1652C0.209778 16.2575 0.133596 16.3678 0.0811869 16.4898C0.0287779 16.6118 0.00119157 16.7431 3.77567e-05 16.8758C-0.00111606 17.0086 0.0241857 17.1403 0.0744666 17.2632C0.124747 17.3861 0.199001 17.4977 0.292893 17.5916C0.386786 17.6855 0.498438 17.7598 0.621334 17.8101C0.744231 17.8604 0.87591 17.8857 1.00869 17.8845C1.14147 17.8833 1.27269 17.8558 1.39469 17.8033C1.5167 17.7509 1.62704 17.6748 1.71929 17.5792L5.89729 13.4012C8.98829 16.3762 10.8943 17.4302 11.6173 17.7612C12.3873 18.1132 13.1743 17.5782 13.2783 16.8482L13.5893 14.6712C13.8034 13.1737 14.3915 11.7543 15.2993 10.5442L17.4833 7.63125C17.7723 7.24602 17.9127 6.76942 17.8785 6.28902C17.8443 5.80862 17.6379 5.35669 17.2973 5.01625L12.8683 0.586248Z" fill="currentColor"/></svg>
                            ${chat.pinned ? 'Unpin' : 'Pin to top'}
                        </div>
                        <div class="action-item" data-action="rename" data-id="${chat.id}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
                            Rename
                        </div>
                        <div class="action-item delete" data-action="delete" data-id="${chat.id}">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            Delete chat
                        </div>
                    </div>
                </div>`;
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function attachHistoryEvents() {
        // click on history item (select chat)
        document.querySelectorAll('.history-item').forEach(el => {
            const id = el.dataset.id;
            if (id) {
                el.addEventListener('click', (e) => {
                    if (!e.target.closest('.options-trigger') && !e.target.closest('.action-menu')) {
                        switchChat(id);
                    }
                });
            }
        });
        // options trigger
        document.querySelectorAll('.options-trigger').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                const menu = document.querySelector(`.action-menu[data-menu="${id}"]`);
                document.querySelectorAll('.action-menu').forEach(m => { if (m !== menu) m.classList.remove('show'); });
                menu.classList.toggle('show');
            });
        });
        // action items
        document.querySelectorAll('.action-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                const action = item.dataset.action;
                const id = item.dataset.id;
                if (action === 'pin') togglePin(id);
                if (action === 'rename') renameChat(id);
                if (action === 'delete') deleteChat(id);
                document.querySelectorAll('.action-menu').forEach(m => m.classList.remove('show'));
            });
        });
        // close menus on outside click
        window.addEventListener('click', (e) => {
            if (!e.target.closest('.options-trigger') && !e.target.closest('.action-menu')) {
                document.querySelectorAll('.action-menu').forEach(m => m.classList.remove('show'));
            }
        });
    }

    function togglePin(chatId) {
        if (conversations[chatId]) {
            conversations[chatId].pinned = !conversations[chatId].pinned;
            saveToLocal();
            renderSidebar();
        }
    }
    function renameChat(chatId) {
        const newName = prompt('New chat name:', conversations[chatId].title);
        if (newName && newName.trim()) {
            conversations[chatId].title = newName.trim().slice(0, 40);
            saveToLocal();
            renderSidebar();
            if (currentChatId === chatId) updateTitleVisibility();
        }
    }
    function deleteChat(chatId) {
        if (confirm('Delete this conversation?')) {
            delete conversations[chatId];
            if (currentChatId === chatId) {
                const remaining = Object.keys(conversations);
                if (remaining.length) currentChatId = remaining[0];
                else {
                    const newId = generateId();
                    conversations[newId] = { id: newId, title: 'New Chat', messages: [], pinned: false, updatedAt: Date.now() };
                    currentChatId = newId;
                }
            }
            saveToLocal();
            renderSidebar();
            renderMessages();
        }
    }
    function switchChat(chatId) {
        currentChatId = chatId;
        renderMessages();
        renderSidebar();
        updateTitleVisibility();
    }
    function updateTitleVisibility() {
        const title = document.getElementById('welcomeTitle');
        const chatContainer = document.getElementById('chatMessages');
        if (conversations[currentChatId]?.messages.length > 0) {
            title.classList.add('hidden-title');
            chatContainer.style.display = 'flex';
        } else {
            title.classList.remove('hidden-title');
            chatContainer.style.display = 'none';
        }
    }

    // Render messages in main area
    function renderMessages() {
        const container = document.getElementById('chatMessages');
        if (!container || !conversations[currentChatId]) return;
        const msgs = conversations[currentChatId].messages;
        container.innerHTML = '';
        if (msgs.length === 0) {
            container.style.display = 'none';
            document.getElementById('welcomeTitle').classList.remove('hidden-title');
            return;
        }
        container.style.display = 'flex';
        document.getElementById('welcomeTitle').classList.add('hidden-title');
        msgs.forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${msg.role}`;
            msgDiv.innerHTML = `<div class="bubble">${formatMessage(msg.content)}</div>
                                <div class="message-meta">${msg.timestamp || getTimestamp()}</div>`;
            container.appendChild(msgDiv);
        });
        container.scrollTop = container.scrollHeight;
    }

    function formatMessage(text) {
        let parsed = escapeHtml(text);
        parsed = parsed.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => `<pre><code class="language-${lang||'plaintext'}">${code}</code></pre>`);
        parsed = parsed.replace(/`([^`]+)`/g, '<code style="background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:12px;">$1</code>');
        parsed = parsed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>');
        parsed = parsed.replace(/\n/g, '<br>');
        return parsed;
    }

    // Send message API
    async function sendMessage() {
        if (isLoading) return;
        const textarea = document.getElementById('messageInput');
        const text = textarea.value.trim();
        if (!text) return;
        textarea.value = '';
        textarea.style.height = 'auto';
        document.getElementById('sendBtn').classList.remove('active');

        const chat = conversations[currentChatId];
        const userMsg = { role: 'user', content: text, timestamp: getTimestamp() };
        chat.messages.push(userMsg);
        chat.updatedAt = Date.now();
        if (chat.title === 'New Chat') chat.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
        saveToLocal();
        renderMessages();
        renderSidebar();
        updateTitleVisibility();

        isLoading = true;
        abortController = new AbortController();
        showTypingIndicator();

        const apiMessages = chat.messages.map(m => ({ role: m.role, content: m.content }));
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: apiMessages }),
                signal: abortController.signal
            });
            const data = await response.json();
            const reply = data.reply || "No response from AI.";
            removeTypingIndicator();
            const assistantMsg = { role: 'assistant', content: reply, timestamp: getTimestamp() };
            chat.messages.push(assistantMsg);
            chat.updatedAt = Date.now();
            saveToLocal();
            renderMessages();
            renderSidebar();
        } catch (err) {
            removeTypingIndicator();
            if (err.name !== 'AbortError') {
                chat.messages.push({ role: 'assistant', content: `Error: ${err.message}`, timestamp: getTimestamp() });
                saveToLocal();
                renderMessages();
            }
        } finally {
            isLoading = false;
            abortController = null;
            textarea.disabled = false;
            textarea.focus();
        }
    }

    function showTypingIndicator() {
        const container = document.getElementById('chatMessages');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message assistant';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
        container.appendChild(typingDiv);
        container.scrollTop = container.scrollHeight;
    }
    function removeTypingIndicator() { const el = document.getElementById('typingIndicator'); if(el) el.remove(); }

    function newChat() {
        const newId = generateId();
        conversations[newId] = { id: newId, title: 'New Chat', messages: [], pinned: false, updatedAt: Date.now() };
        currentChatId = newId;
        saveToLocal();
        renderMessages();
        renderSidebar();
        updateTitleVisibility();
        document.getElementById('messageInput').value = '';
        document.getElementById('sendBtn').classList.remove('active');
    }

    // Voice input
    function startVoice() {
        if (!('webkitSpeechRecognition' in window)) return alert('Voice input not supported');
        const recognition = new webkitSpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.onresult = (e) => {
            document.getElementById('messageInput').value = e.results[0][0].transcript;
            const event = new Event('input');
            document.getElementById('messageInput').dispatchEvent(event);
        };
        recognition.start();
    }

    // Event listeners
    document.getElementById('newChatBtn').addEventListener('click', newChat);
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('micBtn').addEventListener('click', startVoice);
    document.getElementById('plusBtn').addEventListener('click', () => alert('File upload coming soon'));
    document.getElementById('messageInput').addEventListener('input', function() {
        const btn = document.getElementById('sendBtn');
        if (this.value.trim().length > 0) btn.classList.add('active');
        else btn.classList.remove('active');
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 280) + 'px';
    });
    document.getElementById('messageInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    document.getElementById('searchInput').addEventListener('input', () => renderSidebar());

    // Initialisation
    loadData();
    renderSidebar();
    renderMessages();
    updateTitleVisibility();
</script>
</body>
</html>
