<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Zkita AI · by xkitz7</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/css/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #faf0ff;
      --surface: rgba(255, 245, 255, 0.68);
      --surface-solid: #fff0fe;
      --sidebar-bg: rgba(245, 235, 255, 0.85);
      --text: #1a0b1e;
      --text-secondary: #4a2f55;
      --accent: #edc7ff;
      --accent-hover: #e0b3ff;
      --border: rgba(0, 0, 0, 0.08);
      --shadow: 0 8px 20px rgba(0,0,0,0.05);
      --user-msg-bg: #e9d5ff;
      --assistant-msg-bg: #ffffffcc;
      --code-bg: #f0e6ff;
      --scrollbar: #d9c7f0;
      --folder-bg: rgba(0,0,0,0.03);
    }
    body.dark {
      --bg: #09000d;
      --surface: rgba(18, 8, 25, 0.75);
      --surface-solid: #120a1a;
      --sidebar-bg: rgba(18, 8, 30, 0.9);
      --text: #f0e6ff;
      --text-secondary: #cbb2e6;
      --accent: #d780ff;
      --accent-hover: #e09eff;
      --border: rgba(255,255,255,0.1);
      --shadow: 0 8px 20px rgba(0,0,0,0.4);
      --user-msg-bg: #2e1a47;
      --assistant-msg-bg: #1e102ccc;
      --code-bg: #231c2c;
      --scrollbar: #3c2a4a;
      --folder-bg: rgba(255,255,255,0.05);
    }
    body { background-color: var(--bg); font-family: system-ui, 'Segoe UI', 'Inter', sans-serif; color: var(--text); height: 100vh; display: flex; transition: background 0.2s ease; overflow: hidden; touch-action: pan-y; }

    /* Sidebar */
    .sidebar { width: 280px; background: var(--sidebar-bg); backdrop-filter: blur(20px); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 16px; gap: 20px; overflow-y: auto; flex-shrink: 0; }
    .new-chat-btn { background: var(--accent); border: none; padding: 12px; border-radius: 32px; font-weight: 600; font-size: 1rem; color: #1a0b1e; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
    .new-chat-btn:hover { background: var(--accent-hover); transform: scale(0.98); }
    .search-history { margin-top: 8px; padding: 8px 12px; background: var(--surface-solid); border-radius: 28px; border: 1px solid var(--border); width: 100%; font-size: 0.8rem; color: var(--text); outline: none; }
    .history-section { display: flex; flex-direction: column; gap: 16px; flex:1; overflow-y: auto; }
    .folder { margin-bottom: 8px; }
    .folder-header { display: flex; align-items: center; gap: 6px; padding: 6px 8px; cursor: pointer; border-radius: 20px; background: var(--folder-bg); font-weight: 500; font-size: 0.8rem; }
    .folder-header:hover { background: var(--accent); color:#1a0b1e; }
    .folder-name { flex:1; }
    .folder-chats { padding-left: 20px; display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
    .history-item { padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: 0.1s; display: flex; justify-content: space-between; align-items: center; }
    .history-item.active { background: var(--accent); color: #1a0b1e; font-weight: 500; }
    .chat-actions { display: flex; gap: 8px; }
    .pin-icon, .folder-icon { font-size: 0.7rem; opacity: 0.6; cursor: pointer; }
    .pin-icon:hover, .folder-icon:hover { opacity: 1; }
    .no-results { padding: 20px; text-align: center; color: var(--text-secondary); font-size: 0.8rem; }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; background: var(--surface); backdrop-filter: blur(20px); margin: 16px 16px 16px 0; border-radius: 32px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: var(--surface-solid); border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px; }
    .logo h1 { font-size: 1.3rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), #b77dff); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logo p { font-size: 0.65rem; color: var(--text-secondary); }
    .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .icon-btn { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-secondary); width: 34px; height: 34px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
    .icon-btn:hover { background: var(--accent); color: #1a0b1e; }
    .model-badge { font-size: 0.7rem; background: var(--accent); padding: 4px 12px; border-radius: 40px; color: #1a0b1e; font-weight: 500; }

    .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
    .message { display: flex; flex-direction: column; max-width: 85%; animation: fadeIn 0.2s ease; position: relative; }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }
    .bubble { padding: 10px 16px; border-radius: 22px; line-height: 1.5; font-size: 0.9rem; background: var(--assistant-msg-bg); border: 1px solid var(--border); word-wrap: break-word; }
    .user .bubble { background: var(--user-msg-bg); border-bottom-right-radius: 6px; }
    .assistant .bubble { border-bottom-left-radius: 6px; }
    .message-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; font-size: 0.65rem; color: var(--text-secondary); gap: 10px; }
    .timestamp { opacity: 0.7; }
    .pin-message { cursor: pointer; font-size: 0.7rem; opacity: 0.6; }
    .pin-message.pinned { opacity: 1; color: gold; }
    .message-buttons { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .msg-btn { background: transparent; border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 0.65rem; cursor: pointer; color: var(--text-secondary); }
    .msg-btn:hover { background: var(--accent); color: #1a0b1e; }

    .input-area { padding: 12px 20px 20px; background: var(--surface-solid); border-top: 1px solid var(--border); }
    .input-wrapper { display: flex; gap: 8px; background: var(--bg); border-radius: 40px; padding: 6px 12px; border: 1px solid var(--border); align-items: flex-end; }
    textarea { flex: 1; background: transparent; border: none; padding: 10px 4px; font-size: 0.9rem; font-family: inherit; resize: none; outline: none; color: var(--text); max-height: 120px; }
    .input-actions { display: flex; gap: 6px; align-items: center; }
    .char-counter { font-size: 0.7rem; color: var(--text-secondary); margin-right: 6px; }
    button.send-btn, button.stop-btn { background: var(--accent); border: none; border-radius: 40px; padding: 8px 16px; font-weight: 600; cursor: pointer; }
    .stop-btn { background: #ff4444; color: white; }

    /* Modal */
    .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 2000; justify-content: center; align-items: center; }
    .modal-content { background: var(--surface-solid); border-radius: 28px; width: 90%; max-width: 500px; padding: 20px; border: 1px solid var(--border); color: var(--text); max-height: 80vh; overflow-y: auto; }
    .modal-content h3 { margin-bottom: 16px; }
    .modal-content label { display: block; margin: 12px 0 6px; font-weight: 500; }
    .modal-content textarea, .modal-content select { width: 100%; padding: 8px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
    .setting-item { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; }
    .close-modal { float: right; font-size: 24px; cursor: pointer; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #1a0b1e; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; z-index: 3000; animation: fadeOut 2s forwards; pointer-events: none; }
    @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px);} to { opacity:1; transform:translateY(0);} }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius:10px; }
    @media (max-width: 680px) { .sidebar { width: 240px; } .message { max-width: 95%; } .header-actions { gap: 4px; } .icon-btn { width: 32px; height: 32px; font-size: 1rem; } }
  </style>
</head>
<body>
<div class="sidebar">
  <button class="new-chat-btn" id="newChatBtn">➕ New Chat</button>
  <input type="text" id="searchHistoryInput" class="search-history" placeholder="🔍 Search chats...">
  <div class="history-section" id="historySidebar"></div>
</div>

<div class="main">
  <div class="header">
    <div class="logo"><h1>Zkita AI</h1><p>by xkitz7</p></div>
    <div class="header-actions">
      <span class="model-badge" id="modelBadge">Mistral Small</span>
      <button class="icon-btn" id="exportChatsBtn" title="Export all chats">📁</button>
      <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
      <button class="icon-btn" id="themeToggle">🌓</button>
    </div>
  </div>
  <div class="chat-container" id="chatContainer"></div>
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="messageInput" placeholder="Ask me anything! (Ctrl+K = new chat)" rows="1"></textarea>
      <div class="input-actions">
        <span class="char-counter" id="charCounter">0/2000</span>
        <button class="icon-btn" id="voiceInputBtn" title="Voice input">🎤</button>
        <button class="send-btn" id="sendBtn">Send</button>
        <button class="stop-btn" id="stopBtn" style="display:none;">⏹️</button>
      </div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" id="closeSettings">&times;</span>
    <h3>⚙️ Settings</h3>
    <label>🌙 Theme</label>
    <select id="themeSelect"><option value="light">Light</option><option value="dark">Dark</option></select>
    <label>🤖 Custom System Prompt (ZKita's personality)</label>
    <textarea id="customSystemPrompt" rows="3" placeholder="e.g., You are ZKita AI, a helpful assistant..."></textarea>
    <div class="setting-item"><span>📜 Auto-scroll on new messages</span><input type="checkbox" id="autoScrollToggle" checked></div>
    <div class="setting-item"><span>🔊 Text-to-Speech for assistant replies</span><input type="checkbox" id="ttsToggle"></div>
    <button id="saveSettingsBtn" style="margin-top: 16px; background:var(--accent); border:none; padding:8px 20px; border-radius:40px;">Save</button>
  </div>
</div>

<script>
  // ------------------- Data Model -------------------
  let conversations = {};
  let currentChatId = null;
  let isLoading = false;
  let abortController = null;
  let currentStream = null;
  let userSystemPrompt = ""; // custom system prompt override
  let autoScroll = true;
  let ttsEnabled = false;

  const STORAGE_KEY = 'zkita_full_v2';

  function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }

  function loadData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if(stored) {
      try {
        const data = JSON.parse(stored);
        conversations = data.conversations || {};
        userSystemPrompt = data.userSystemPrompt || "";
        autoScroll = data.autoScroll !== undefined ? data.autoScroll : true;
        ttsEnabled = data.ttsEnabled || false;
        if(Object.keys(conversations).length === 0) createDefaultChat();
      } catch(e) { createDefaultChat(); }
    } else { createDefaultChat(); }
    if(!conversations[currentChatId]) currentChatId = Object.keys(conversations)[0];
    saveToLocal();
  }

  function createDefaultChat() {
    const id = generateId();
    conversations = { [id]: { id, title: 'New Chat', messages: [], folders: [], pinned: false, createdAt: Date.now(), updatedAt: Date.now(), folderId: null } };
    currentChatId = id;
  }

  function saveToLocal() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ conversations, userSystemPrompt, autoScroll, ttsEnabled }));
  }

  // folders structure (Discord-like)
  let folders = {}; // folderId => { name, chatIds }
  function loadFolders() { const f = localStorage.getItem('zkita_folders'); if(f) folders = JSON.parse(f); else folders = {}; }
  function saveFolders() { localStorage.setItem('zkita_folders', JSON.stringify(folders)); }

  // ------------------- Helpers -------------------
  function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

  function formatMessage(text) {
    let parsed = escapeHtml(text);
    parsed = parsed.replace(/```(\w*)\n([\s\S]*?)```/g, (m,lang,code) => `<pre><code class="language-${lang||'plaintext'}">${code}</code></pre>`);
    parsed = parsed.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
    parsed = parsed.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
    parsed = parsed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    parsed = parsed.replace(/\*(.*?)\*/g, '<em>$1</em>');
    parsed = parsed.replace(/\|\|(.*?)\|\|/g, '<span class="spoiler" onclick="this.classList.add(\'revealed\')" style="background:#1a1a2e; color:#1a1a2e; cursor:pointer;">$1</span>');
    parsed = parsed.replace(/\n/g, '<br>');
    return parsed;
  }

  function getTimestamp() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }

  // render sidebar with folders and search
  function renderSidebar() {
    const container = document.getElementById('historySidebar');
    if(!container) return;
    const searchTerm = document.getElementById('searchHistoryInput')?.value.toLowerCase() || '';
    let chatsArray = Object.values(conversations).sort((a,b)=>b.updatedAt - a.updatedAt);
    if(searchTerm) chatsArray = chatsArray.filter(c => c.title.toLowerCase().includes(searchTerm));

    const folderGroups = { 'ungrouped': [] };
    for(let f in folders) folderGroups[f] = [];
    for(let chat of chatsArray) {
      if(chat.folderId && folders[chat.folderId]) folderGroups[chat.folderId].push(chat);
      else folderGroups['ungrouped'].push(chat);
    }
    let html = '';
    for(let fid in folderGroups) {
      if(fid !== 'ungrouped' && folderGroups[fid].length===0) continue;
      const folderName = fid==='ungrouped' ? '📁 All Chats' : folders[fid]?.name || 'Folder';
      html += `<div class="folder" data-folder-id="${fid}">`;
      if(fid !== 'ungrouped') {
        html += `<div class="folder-header"><span class="folder-toggle">▼</span><span class="folder-name">📂 ${escapeHtml(folderName)}</span><span class="folder-icon" data-folder-id="${fid}">⚙️</span></div><div class="folder-chats" style="display:block;">`;
      } else {
        html += `<div class="folder-header"><span class="folder-name">📁 All Chats</span></div><div class="folder-chats">`;
      }
      for(let chat of folderGroups[fid]) {
        const activeClass = currentChatId === chat.id ? 'active' : '';
        const pinnedIcon = chat.pinned ? '📌' : '📍';
        html += `<div class="history-item ${activeClass}" data-id="${chat.id}">
          <span class="chat-title">${escapeHtml(chat.title)}</span>
          <div class="chat-actions">
            <span class="pin-icon" data-id="${chat.id}" data-pinned="${chat.pinned}">${pinnedIcon}</span>
            <span class="folder-icon" data-id="${chat.id}" data-move="true">📁</span>
          </div>
        </div>`;
      }
      html += `</div></div>`;
    }
    container.innerHTML = html || '<div class="no-results">No chats found</div>';

    document.querySelectorAll('.history-item').forEach(el => {
      el.addEventListener('click', (e) => { if(!e.target.classList.contains('pin-icon') && !e.target.classList.contains('folder-icon')) switchChat(el.dataset.id); });
    });
    document.querySelectorAll('.pin-icon').forEach(icon => {
      icon.addEventListener('click', (e) => { e.stopPropagation(); togglePin(icon.dataset.id); });
    });
    document.querySelectorAll('.folder-icon[data-move]').forEach(icon => {
      icon.addEventListener('click', (e) => { e.stopPropagation(); moveToFolder(icon.dataset.id); });
    });
    document.querySelectorAll('.folder-header .folder-icon').forEach(icon => {
      icon.addEventListener('click', (e) => { e.stopPropagation(); editFolder(icon.dataset.folderId); });
    });
    document.querySelectorAll('.folder-header').forEach(header => {
      const toggle = header.querySelector('.folder-toggle');
      if(toggle) toggle.addEventListener('click', (e) => { e.stopPropagation(); const chatsDiv = header.parentElement.querySelector('.folder-chats'); chatsDiv.style.display = chatsDiv.style.display==='none'?'block':'none'; });
    });
  }

  function togglePin(chatId) { if(conversations[chatId]) { conversations[chatId].pinned = !conversations[chatId].pinned; saveToLocal(); renderSidebar(); } }
  function moveToFolder(chatId) { let newFolder = prompt("Enter folder name (or leave empty for root):"); if(newFolder===null) return; newFolder = newFolder.trim(); if(newFolder) { let fid = Object.keys(folders).find(k=>folders[k].name===newFolder); if(!fid) { fid = generateId(); folders[fid] = { name: newFolder, chatIds: [] }; } folders[fid].chatIds.push(chatId); conversations[chatId].folderId = fid; } else { if(conversations[chatId].folderId) delete conversations[chatId].folderId; } saveFolders(); saveToLocal(); renderSidebar(); }
  function editFolder(fid) { let newName = prompt("Folder name:", folders[fid]?.name); if(newName && folders[fid]) folders[fid].name = newName; saveFolders(); renderSidebar(); }

  // render messages with timestamp, pin, TTS
  function renderMessages() {
    const container = document.getElementById('chatContainer');
    if(!container || !currentChatId || !conversations[currentChatId]) return;
    const msgs = conversations[currentChatId].messages;
    container.innerHTML = '';
    msgs.forEach((msg, idx) => {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${msg.role}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = formatMessage(msg.content);
      msgDiv.appendChild(bubble);
      const meta = document.createElement('div');
      meta.className = 'message-meta';
      const timeSpan = document.createElement('span');
      timeSpan.className = 'timestamp';
      timeSpan.innerText = msg.timestamp || getTimestamp();
      meta.appendChild(timeSpan);
      const pinSpan = document.createElement('span');
      pinSpan.className = `pin-message ${msg.pinned ? 'pinned' : ''}`;
      pinSpan.innerText = msg.pinned ? '📌' : '📍';
      pinSpan.onclick = () => { msg.pinned = !msg.pinned; saveToLocal(); renderMessages(); };
      meta.appendChild(pinSpan);
      msgDiv.appendChild(meta);
      const btnDiv = document.createElement('div');
      btnDiv.className = 'message-buttons';
      const copyBtn = document.createElement('button'); copyBtn.innerText = 'Copy'; copyBtn.className = 'msg-btn'; copyBtn.onclick = () => { navigator.clipboard.writeText(msg.content); showToast('Copied!'); };
      btnDiv.appendChild(copyBtn);
      const downBtn = document.createElement('button'); downBtn.innerText = 'Download'; downBtn.className = 'msg-btn'; downBtn.onclick = () => { const blob = new Blob([msg.content], {type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='ZKITA.txt'; a.click(); URL.revokeObjectURL(blob); };
      btnDiv.appendChild(downBtn);
      if(msg.role === 'assistant' && ttsEnabled) {
        const speakBtn = document.createElement('button'); speakBtn.innerText = '🔊'; speakBtn.className = 'msg-btn'; speakBtn.onclick = () => { const utterance = new SpeechSynthesisUtterance(msg.content); window.speechSynthesis.cancel(); window.speechSynthesis.speak(utterance); };
        btnDiv.appendChild(speakBtn);
      }
      msgDiv.appendChild(btnDiv);
      container.appendChild(msgDiv);
    });
    document.querySelectorAll('.bubble pre code').forEach(block => hljs.highlightElement(block));
    if(autoScroll) container.scrollTop = container.scrollHeight;
  }

  function showToast(msg) { const t = document.createElement('div'); t.className='toast'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }

  // API call with abort support, token counter
  async function sendMessage(editedMessages = null) {
    if(isLoading) { showToast("Generation in progress, please wait..."); return; }
    const inputField = document.getElementById('messageInput');
    let text = editedMessages ? editedMessages : inputField.value.trim();
    if(!text && !editedMessages) return;
    if(!editedMessages) inputField.value = '';
    document.getElementById('charCounter').innerText = '0/2000';
    const chat = conversations[currentChatId];
    const userMsg = { role: 'user', content: text, timestamp: getTimestamp(), pinned: false };
    if(!editedMessages) chat.messages.push(userMsg);
    chat.updatedAt = Date.now();
    if(chat.title === 'New Chat') chat.title = text.slice(0,30)+(text.length>30?'...':'');
    saveToLocal();
    renderMessages();
    renderSidebar();

    isLoading = true;
    document.getElementById('sendBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'inline-flex';
    abortController = new AbortController();

    const apiMessages = chat.messages.map(m => ({ role: m.role, content: m.content }));
    if(userSystemPrompt) apiMessages.unshift({ role: 'system', content: userSystemPrompt });

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: apiMessages }),
        signal: abortController.signal
      });
      const data = await response.json();
      const reply = data.reply || "No response";
      const tokenUsage = data.tokens || null;
      const assistantMsg = { role: 'assistant', content: reply, timestamp: getTimestamp(), pinned: false, tokens: tokenUsage };
      chat.messages.push(assistantMsg);
      chat.updatedAt = Date.now();
      saveToLocal();
      renderMessages();
      renderSidebar();
      if(ttsEnabled && reply) { const utterance = new SpeechSynthesisUtterance(reply); window.speechSynthesis.cancel(); window.speechSynthesis.speak(utterance); }
      if(tokenUsage) showToast(`Used ~${tokenUsage} tokens`);
    } catch(err) {
      if(err.name !== 'AbortError') {
        chat.messages.push({ role: 'assistant', content: `⚠️ Error: ${err.message}`, timestamp: getTimestamp() });
        saveToLocal();
        renderMessages();
      }
    } finally {
      isLoading = false;
      document.getElementById('sendBtn').style.display = 'inline-flex';
      document.getElementById('stopBtn').style.display = 'none';
      abortController = null;
      inputField.disabled = false;
      inputField.focus();
    }
  }

  function stopGeneration() { if(abortController) abortController.abort(); }

  // export all chats as JSON
  function exportAllChats() {
    const exportData = { conversations, folders, userSystemPrompt, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `zkita_all_chats_${Date.now()}.json`; a.click(); URL.revokeObjectURL(blob);
    showToast('Exported all chats!');
  }

  // voice input
  function startVoiceInput() {
    if(!('webkitSpeechRecognition' in window)) { alert("Voice input not supported in this browser"); return; }
    const recognition = new webkitSpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.onresult = (e) => { document.getElementById('messageInput').value = e.results[0][0].transcript; document.getElementById('charCounter').innerText = `${e.results[0][0].transcript.length}/2000`; };
    recognition.start();
  }

  // Settings modal
  const modal = document.getElementById('settingsModal');
  document.getElementById('settingsBtn').onclick = () => {
    document.getElementById('themeSelect').value = document.body.classList.contains('dark') ? 'dark' : 'light';
    document.getElementById('customSystemPrompt').value = userSystemPrompt;
    document.getElementById('autoScrollToggle').checked = autoScroll;
    document.getElementById('ttsToggle').checked = ttsEnabled;
    modal.style.display = 'flex';
  };
  document.getElementById('closeSettings').onclick = () => modal.style.display = 'none';
  document.getElementById('saveSettingsBtn').onclick = () => {
    userSystemPrompt = document.getElementById('customSystemPrompt').value;
    autoScroll = document.getElementById('autoScrollToggle').checked;
    ttsEnabled = document.getElementById('ttsToggle').checked;
    const theme = document.getElementById('themeSelect').value;
    if(theme === 'dark') document.body.classList.add('dark');
    else document.body.classList.remove('dark');
    saveToLocal();
    modal.style.display = 'none';
    showToast('Settings saved');
  };

  // theme toggle (also in header)
  function setTheme(theme) { if(theme==='dark') document.body.classList.add('dark'); else document.body.classList.remove('dark'); localStorage.setItem('zkita_theme', theme); }
  function toggleTheme() { setTheme(document.body.classList.contains('dark') ? 'light' : 'dark'); }
  function initTheme() { const saved = localStorage.getItem('zkita_theme'); setTheme(saved === 'dark' ? 'dark' : 'light'); }

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if(e.ctrlKey && e.key === 'k') { e.preventDefault(); newChat(); }
  });

  function newChat() {
    const newId = generateId();
    conversations[newId] = { id: newId, title: 'New Chat', messages: [], createdAt: Date.now(), updatedAt: Date.now(), pinned: false, folderId: null };
    saveToLocal();
    switchChat(newId);
  }
  function switchChat(id) { if(conversations[id]) { currentChatId = id; renderMessages(); renderSidebar(); } }

  // character counter
  const inputArea = document.getElementById('messageInput');
  inputArea.addEventListener('input', function() { const len = this.value.length; document.getElementById('charCounter').innerText = `${len}/2000`; if(len>2000) this.value = this.value.slice(0,2000); });
  inputArea.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

  // initialize
  loadData();
  loadFolders();
  initTheme();
  renderMessages();
  renderSidebar();

  document.getElementById('sendBtn').onclick = () => sendMessage();
  document.getElementById('stopBtn').onclick = stopGeneration;
  document.getElementById('newChatBtn').onclick = newChat;
  document.getElementById('voiceInputBtn').onclick = startVoiceInput;
  document.getElementById('exportChatsBtn').onclick = exportAllChats;
  document.getElementById('themeToggle').onclick = toggleTheme;
  document.getElementById('searchHistoryInput').addEventListener('input', () => renderSidebar());

  // mobile optimizations: disable zoom on input (already viewport)
  // native browser optimization: smooth scrolling, touch events
</script>
</body>
</html>
