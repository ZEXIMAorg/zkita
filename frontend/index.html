<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ZKita AI · Open Source Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* LIGHT theme (default) */
    :root {
      --bg: #faf0ff;
      --surface: rgba(255, 245, 255, 0.68);
      --surface-solid: #fff0fe;
      --text: #1a0b1e;
      --text-secondary: #4a2f55;
      --accent: #edc7ff;
      --accent-hover: #e0b3ff;
      --border: rgba(0, 0, 0, 0.08);
      --shadow: 0 8px 20px rgba(0,0,0,0.05);
      --user-msg-bg: #e9d5ff;
      --assistant-msg-bg: #ffffffcc;
      --spoiler-bg: #1a1a2e;
      --spoiler-text: #1a1a2e;
      --code-bg: #f0e6ff;
      --scrollbar: #d9c7f0;
    }

    body.dark {
      --bg: #09000d;
      --surface: rgba(18, 8, 25, 0.75);
      --surface-solid: #120a1a;
      --text: #f0e6ff;
      --text-secondary: #cbb2e6;
      --accent: #d780ff;
      --accent-hover: #e09eff;
      --border: rgba(255,255,255,0.1);
      --shadow: 0 8px 20px rgba(0,0,0,0.4);
      --user-msg-bg: #2e1a47;
      --assistant-msg-bg: #1e102ccc;
      --spoiler-bg: #2a2a3a;
      --spoiler-text: #2a2a3a;
      --code-bg: #231c2c;
      --scrollbar: #3c2a4a;
    }

    body {
      background-color: var(--bg);
      backdrop-filter: blur(0px);
      font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.2s ease;
    }

    /* frosted glass main panel */
    .app {
      max-width: 1100px;
      margin: 16px auto;
      width: calc(100% - 32px);
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      height: calc(100% - 32px);
    }

    /* header with frosted effect */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: var(--surface-solid);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(4px);
    }

    .logo h1 {
      font-size: 1.7rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), #b77dff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .logo p {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .icon-btn {
      background: transparent;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: 0.2s;
      border-radius: 40px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      background: var(--accent);
      color: #1a0b1e;
    }

    /* chat container */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    /* message bubbles */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeIn 0.2s ease-out;
    }

    .message.user {
      align-self: flex-end;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .bubble {
      padding: 12px 18px;
      border-radius: 26px;
      line-height: 1.5;
      font-size: 0.95rem;
      word-wrap: break-word;
      white-space: pre-wrap;
      background: var(--assistant-msg-bg);
      backdrop-filter: blur(4px);
      border: 1px solid var(--border);
    }

    .user .bubble {
      background: var(--user-msg-bg);
      color: var(--text);
      border-bottom-right-radius: 6px;
    }

    .assistant .bubble {
      border-bottom-left-radius: 6px;
    }

    /* markdown styles */
    .bubble code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 12px;
      font-family: 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 0.85rem;
    }

    .bubble pre {
      background: var(--code-bg);
      padding: 10px;
      border-radius: 16px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .bubble strong {
      font-weight: 700;
    }

    .bubble em {
      font-style: italic;
    }

    .bubble strong em, .bubble em strong {
      font-weight: 700;
      font-style: italic;
    }

    /* spoiler */
    .spoiler {
      background: var(--spoiler-bg);
      color: var(--spoiler-text);
      cursor: pointer;
      border-radius: 12px;
      padding: 0 4px;
      transition: 0.1s;
      user-select: none;
    }
    .spoiler.revealed {
      background: transparent;
      color: inherit;
    }

    /* input area */
    .input-area {
      padding: 16px 20px 24px;
      background: var(--surface-solid);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      background: var(--bg);
      border-radius: 40px;
      padding: 6px 12px;
      border: 1px solid var(--border);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px 8px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: none;
      outline: none;
      color: var(--text);
      max-height: 160px;
    }

    button.send-btn {
      background: var(--accent);
      border: none;
      border-radius: 40px;
      padding: 10px 18px;
      font-weight: 600;
      color: #1a0b1e;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.9rem;
    }

    button.send-btn:hover {
      background: var(--accent-hover);
      transform: scale(1.02);
    }

    .clear-btn {
      background: rgba(0,0,0,0.05);
    }

    /* loading dots */
    .typing {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
    }
    .typing span {
      width: 8px;
      height: 8px;
      background: var(--text-secondary);
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 60%, 100% { opacity: 0.4; transform: scale(0.8);}
      30% { opacity: 1; transform: scale(1);}
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px);}
      to { opacity: 1; transform: translateY(0);}
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--scrollbar);
      border-radius: 8px;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <h1>⚡ ZKita AI</h1>
      <p>open source · from Tabuk</p>
    </div>
    <div class="actions">
      <button class="icon-btn" id="themeToggle" aria-label="Dark/Light mode">🌓</button>
      <button class="icon-btn" id="clearHistoryBtn" aria-label="Clear chat history">🗑️</button>
    </div>
  </div>

  <div class="chat-container" id="chatContainer">
    <!-- messages will appear here -->
    <div class="message assistant">
      <div class="bubble">Hello! I'm ZKita AI. How can I help you today? ✨</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="messageInput" placeholder="Ask me anything... use `code`, *italic*, **bold**, ***bold italic***, ||spoiler||" rows="1"></textarea>
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>
</div>

<script>
  // ---------------- markdown parser (supports `, *, **, ***, ||spoiler||) ----------------
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function parseMarkdown(text) {
    // escape html first
    let parsed = escapeHtml(text);

    // inline code `code`
    parsed = parsed.replace(/`([^`]+)`/g, '<code>$1</code>');

    // spoiler: ||hidden|| -> <span class="spoiler">hidden</span>
    parsed = parsed.replace(/\|\|(.*?)\|\|/g, (match, content) => {
      return `<span class="spoiler">${content}</span>`;
    });

    // bold+italic ***
    parsed = parsed.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
    // bold **
    parsed = parsed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // italic *
    parsed = parsed.replace(/\*(.*?)\*/g, '<em>$1</em>');

    // line break handling
    parsed = parsed.replace(/\n/g, '<br>');
    return parsed;
  }

  // convert spoiler spans to interactive (reveal on click)
  function attachSpoilerListeners(container) {
    const spoilers = container.querySelectorAll('.spoiler');
    spoilers.forEach(sp => {
      if (sp.getAttribute('data-listener')) return;
      sp.setAttribute('data-listener', 'true');
      sp.addEventListener('click', (e) => {
        e.stopPropagation();
        sp.classList.add('revealed');
      });
    });
  }

  // ---------- chat state ----------
  let chatHistory = [];     // array of {role, content}
  const STORAGE_KEY = 'zkita_chat_history';
  const API_ENDPOINT = '/api/chat';
  let isLoading = false;

  // load from localStorage
  function loadHistory() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        chatHistory = JSON.parse(stored);
      } catch(e) { chatHistory = []; }
    }
    if (!chatHistory.length) {
      // seed with a welcome message (assistant)
      chatHistory = [
        { role: 'assistant', content: 'Hello! I\'m ZKita AI. How can I help you today? ✨' }
      ];
    }
  }

  function saveHistory() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(chatHistory));
  }

  // render chat from chatHistory array
  function renderChat() {
    const container = document.getElementById('chatContainer');
    if (!container) return;
    // keep scroll position later
    const wasScrolledToBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 30;

    container.innerHTML = '';
    for (const msg of chatHistory) {
      const div = document.createElement('div');
      div.className = `message ${msg.role}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      // parse markdown content
      const parsedHtml = parseMarkdown(msg.content);
      bubble.innerHTML = parsedHtml;
      div.appendChild(bubble);
      container.appendChild(div);
    }
    // attach spoiler click handlers
    attachSpoilerListeners(container);
    if (wasScrolledToBottom) {
      container.scrollTop = container.scrollHeight;
    }
  }

  // add new message to history and re-render
  function addMessage(role, content) {
    chatHistory.push({ role, content });
    saveHistory();
    renderChat();
  }

  // call API
  async function sendMessageToAPI(userMessage) {
    // build messages array (without system prompt, worker already adds system)
    const apiMessages = chatHistory.map(m => ({ role: m.role, content: m.content }));
    // but we remove the last assistant message that might have been added by previous call? we already added user message before sending.
    // Better: before calling, the user message is already added to chatHistory.
    // So apiMessages includes the user message just added.
    const response = await fetch(API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: apiMessages })
    });
    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(`API error ${response.status}: ${errorText}`);
    }
    const data = await response.json();
    return data.reply;
  }

  // typing indicator
  function showTypingIndicator() {
    const container = document.getElementById('chatContainer');
    const typingDiv = document.createElement('div');
    typingDiv.className = 'message assistant typing-indicator';
    typingDiv.id = 'typingIndicator';
    typingDiv.innerHTML = `<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    container.appendChild(typingDiv);
    container.scrollTop = container.scrollHeight;
  }

  function removeTypingIndicator() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function handleSend() {
    if (isLoading) return;
    const inputEl = document.getElementById('messageInput');
    const message = inputEl.value.trim();
    if (!message) return;

    // disable input during request
    isLoading = true;
    inputEl.disabled = true;
    document.getElementById('sendBtn').disabled = true;

    // add user message to UI and history
    addMessage('user', message);
    inputEl.value = '';
    // auto resize back
    inputEl.style.height = 'auto';

    // show typing indicator
    showTypingIndicator();

    try {
      const reply = await sendMessageToAPI(message);
      removeTypingIndicator();
      addMessage('assistant', reply);
    } catch (err) {
      removeTypingIndicator();
      console.error(err);
      addMessage('assistant', `⚠️ I'm having trouble connecting. Please try again later. (${err.message})`);
    } finally {
      isLoading = false;
      inputEl.disabled = false;
      document.getElementById('sendBtn').disabled = false;
      inputEl.focus();
    }
  }

  // clear history
  function clearHistory() {
    if (confirm('Delete all conversation history?')) {
      chatHistory = [];
      saveHistory();
      // add fresh welcome
      chatHistory = [{ role: 'assistant', content: 'Hello! I\'m ZKita AI. How can I help you today? ✨' }];
      saveHistory();
      renderChat();
    }
  }

  // ---------- THEME (light/dark) with custom accent ----------
  function setTheme(theme) {
    if (theme === 'dark') {
      document.body.classList.add('dark');
      localStorage.setItem('zkita_theme', 'dark');
    } else {
      document.body.classList.remove('dark');
      localStorage.setItem('zkita_theme', 'light');
    }
  }

  function toggleTheme() {
    const isDark = document.body.classList.contains('dark');
    setTheme(isDark ? 'light' : 'dark');
  }

  function initTheme() {
    const saved = localStorage.getItem('zkita_theme');
    if (saved === 'dark') setTheme('dark');
    else setTheme('light');  // default light
  }

  // auto-resize textarea
  function autoResizeTextarea() {
    const textarea = document.getElementById('messageInput');
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
  }

  // event binding
  document.addEventListener('DOMContentLoaded', () => {
    loadHistory();
    renderChat();
    initTheme();
    const sendBtn = document.getElementById('sendBtn');
    const inputField = document.getElementById('messageInput');
    const clearBtn = document.getElementById('clearHistoryBtn');
    const themeToggleBtn = document.getElementById('themeToggle');

    sendBtn.addEventListener('click', handleSend);
    clearBtn.addEventListener('click', clearHistory);
    themeToggleBtn.addEventListener('click', toggleTheme);

    inputField.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });
    inputField.addEventListener('input', autoResizeTextarea);
    inputField.focus();
  });
</script>
</body>
</html>
